---
# This workflow is triggered by the parent workflow and must not be triggered directly.

name: Reusable build container workflow

env:
  # BUILDX_NO_DEFAULT_ATTESTATIONS must be set to build only arm64 and amd64 images.
  # The devcontainers/ci@v0.3 build will fail if this env variable is not set.
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

on:
  workflow_call:
    inputs:
      container_name:
        required: false
        type: string
        default: lab-base
      image_tags:
        required: false
        type: string
      platform:
        required: false
        type: string
        default: linux/arm64/v8,linux/amd64
      from_image:
        required: false
        type: string
        default: ghcr.io/aristanetworks/avd/universal
      from_variant:
        required: false
        type: string
        default: latest
      username:
        required: false
        type: string
        default: avd
      user_id:
        required: false
        type: string
        default: 1000
      group_id:
        required: false
        type: string
        default: 1000
      git_init:
        required: false
        type: boolean
        default: true
      clab_version:
        required: false
        type: string
      container_revision:
        required: false
        type: string
        default: latest

jobs:
  build_image:
    runs-on: ubuntu-22.04
    steps:
      - name: Starting container build
        run: echo "Starting container build. Be patient. 🐢"
      - name: Checkout code ✅
        uses: actions/checkout@v4

      - name: Build image tags 🏷️
        id: build-tags
        run: |
          if [ -z "${{ inputs.image_tags }}" ]; then
            echo "No image tags provided. Building tags."
            if [ "${{ inputs.user_id }}" != "1000" ]; then
              echo "image_tags=${{ inputs.from_variant }}-clab${{ inputs.clab_version }}-rev${{ inputs.container_revision }}-uid${{ inputs.user_id }}" >> $GITHUB_OUTPUT
            else
              echo "image_tags=${{ inputs.from_variant }}-clab${{ inputs.clab_version }}-rev${{ inputs.container_revision }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "Using provided image tags."
            echo "image_tags=${{ inputs.image_tags }}" >> $GITHUB_OUTPUT
          fi

      - name: Convert Github repository name to lowercase ⬇️
        id: gh_repo
        run: echo "name_lowcase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Setup QEMU for multi-arch builds 🏗️
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ inputs.platform }}

      - name: Setup Docker buildX for multi-arch builds 🏗️
        uses: docker/setup-buildx-action@v3

      - name: Login to the container registry 🗝️
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists on container registry 🕵️
        id: check-image
        run: |
          echo "exit_code=0" >> $GITHUB_OUTPUT
          if [ "${{ inputs.container_name }}" == "dev" ]; then
            # always rebuild dev image, but check if already exists for other images
            echo "exit_code=1" >> $GITHUB_OUTPUT
          else
            IFS=',' read -ra image_tags <<< ${{ steps.build-tags.outputs.image_tags }}
            for image_tag in "${image_tags[@]}"; do
              echo "Checking if ghcr.io/${{ steps.gh_repo.outputs.name_lowcase }}/${{ inputs.container_name }}:$image_tag already exists."
              docker manifest inspect ghcr.io/${{ steps.gh_repo.outputs.name_lowcase }}/${{ inputs.container_name }}:$image_tag || echo "exit_code=1" >> $GITHUB_OUTPUT
            done
          fi

      - name: Run container prebuild script if present 🧰
        # rev1.0.53 (lab-base-sandbox): generic extensibility hook for
        # containers that need to assemble build-context content from
        # elsewhere in the repo before the devcontainer build runs.
        #
        # If `containers/<name>/.devcontainer/prebuild.sh` exists, it is
        # executed from the repo root. The script is expected to be
        # idempotent (it'll run on every build, including local re-runs)
        # and self-contained (no external network access guaranteed).
        #
        # Used by lab-base-sandbox to copy `labs/sandbox/` into
        # `.devcontainer/sandbox-original/` before docker build, so the
        # baseline that ships in the image always reflects the canonical
        # `labs/sandbox/` content (which is also the bind-mount source
        # when developers open the aclabs repo directly via Codespaces
        # or devcontainer-cli). Pre-rev1.0.53, `sandbox-original/` was
        # a manually-synced duplicate in git; rev1.0.53 makes it a
        # build-time artifact derived from a single source of truth.
        #
        # Containers that don't need this step have no prebuild.sh and
        # this step short-circuits with no effect.
        run: |
          PREBUILD="containers/${{ inputs.container_name }}/.devcontainer/prebuild.sh"
          if [ -x "$PREBUILD" ]; then
            echo "Running prebuild script: $PREBUILD"
            "$PREBUILD"
          elif [ -f "$PREBUILD" ]; then
            echo "Found $PREBUILD but it is not executable — running via bash"
            bash "$PREBUILD"
          else
            echo "No prebuild script for ${{ inputs.container_name }} — skipping"
          fi

      - name: Pre-build dev container image 🔨
        uses: devcontainers/ci@v0.3
        # Only build and push the image if at least one of the image tags does not exist.
        # if: steps.check-image.outputs.exit_code != 0
        env:
          FROM_IMAGE: ${{ inputs.from_image }}
          FROM_VARIANT: ${{ inputs.from_variant }}
          USERNAME: ${{ inputs.username }}
          UID: ${{ inputs.user_id }}
          GID: ${{ inputs.group_id }}
          CLAB_VERSION: ${{ inputs.clab_version }}
          CEOS_LAB_VERSION_ARG: ${{ inputs.ceos_lab_version }}
          GIT_INIT_ARG: ${{ inputs.git_init }}
        with:
          subFolder: containers/${{ inputs.container_name }}
          imageName: ghcr.io/${{ steps.gh_repo.outputs.name_lowcase }}/${{ inputs.container_name }}
          imageTag: ${{ steps.build-tags.outputs.image_tags }}
          platform: ${{ inputs.platform }}
          push: always
