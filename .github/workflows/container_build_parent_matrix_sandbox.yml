      # - The actual root cause of v0.9.0-v0.9.2's progressive
      #   confusion: `await executeCommand('github.publish')`
      #   returns IMMEDIATELY when dispatched, not when the user
      #   finishes interacting with the prompts the command spawns.
      #   This is how VS Code's command system works in general.
      # - What this meant in practice: v0.9.2's post-publish URL
      #   prompt was firing while VS Code's publish dialog was
      #   still open, superseding VS Code's UI before the user
      #   could complete the publish flow. Every "evidence" we
      #   collected ("repo is empty," "origin not persisted") was
      #   actually evidence of THIS race condition — not of
      #   github.publish doing nothing useful. The tool was working
      #   all along; we were just stomping on its UI.
      # - The fix: drastically simpler. Get out of github.publish's
