---
name: build lab-base-sandbox images

on:
  push:
    branches: ['**']  # branches will be filtered in the jobs
    paths:
      - .github/workflows/container_build_child.yml
      - .github/workflows/container_build_parent_matrix_sandbox.yml
      - containers/lab-base-sandbox/**
  workflow_dispatch:
    branches: ['**']  # branches will be filtered in the jobs

permissions:
  packages: write

jobs:
  build-lab-containers:
    # fork - build container from any branch for testing
    # parent repo - build on main branch only
    if: github.repository != 'aristanetworks/acLabs' || github.ref == 'refs/heads/main'
    uses: ./.github/workflows/container_build_child.yml
    strategy:
      matrix:
        from_image: ["ghcr.io/aristanetworks/avd/universal"]
        from_variant: ["python3.12-avd-v5.7.3", "python3.12-avd-v6.1.0"]
        clab_version: ["0.75.0"]
        user_id: ["1000", "1009"]
        include:
          - user_id: "1000"
            group_id: "1000"
          - user_id: "1009"
            group_id: "1009"
    with:
      container_name: lab-base-sandbox
      from_image: ${{ matrix.from_image }}
      from_variant: ${{ matrix.from_variant }}
      clab_version: ${{ matrix.clab_version }}
      user_id: ${{ matrix.user_id }}
      group_id: ${{ matrix.group_id }}
      # 1.0.0:
      # - Initial release of lab-base-sandbox, sister image to
      #   lab-base-techlib. Same OS layer, code-server, ContainerLab,
      #   and Python deps; differs in two ways:
      #     1. Bakes packetanglers.sandbox-dashboard 0.1.0 instead of
      #        lab-dashboard. Sandbox is a stateful long-lived control
      #        plane (import / start / save / export), techlib is a
      #        write-once status renderer. Different jobs.
      #     2. Does NOT ship /bin/init_lab.py or /bin/docs_generate.py.
      #        The sandbox lab doesn't auto-deploy a topology; the user
      #        drives the lifecycle from the dashboard, so there's
      #        nothing for init_lab to wait for at boot.
      # - Pinned extension versions match lab-base-techlib for
      #   reproducibility (srl-labs.vscode-containerlab@0.24.2,
      #   tuxtina.json2yaml@0.2.0, yzhang.markdown-all-in-one@3.6.2).
      # - Inherits the 3-attempt retry loop for OpenVSX installs.
      # 1.0.1:
      # - Bump packetanglers.sandbox-dashboard 0.1.0 -> 0.2.0, adding
      #   live workspace awareness to the bundled extension:
      #     * auto-open on first activation per workspace
      #     * topology file discovery with subfolder grouping
      #     * containerlab inspection + 30s polling reactivity
      #     * file-watcher for *.clab.yml changes
      #     * display polish (empty states, live timestamps, error
      #       banner, running-lab indicator)
      # - No base OS / code-server / containerlab / Python-deps
      #   changes. This is a pure extension bump.
      # 1.0.2:
      # - Bump packetanglers.sandbox-dashboard 0.2.0 -> 0.2.1, a
      #   hotfix release. 0.2.0 shipped with a malformed string
      #   literal in the webview JS (cross-platform path-splitting
      #   code for topology grouping), which killed the entire
      #   inline script and stuck all three dashboard sections on
      #   "Computing…" forever. 0.2.1 restores the correct
      #   escaping and the dashboard renders as intended.
      # - Pure extension bump, no image layer changes below the
      #   extension install.
      # 1.0.3:
      # - Bump packetanglers.sandbox-dashboard 0.2.1 -> 0.2.2, a
      #   second hotfix. 0.2.1 correctly rendered the dashboard
      #   but its containerlab inspect JSON parser was written
      #   against an older shape assumption; against current
      #   containerlab 0.74+, every poll surfaced "unrecognized
      #   JSON shape" in the ContainerLab section. 0.2.2 teaches
      #   the parser about the current keyed-by-lab_name shape.
      # - Pure extension bump.
      # 1.0.4:
      # - Bump packetanglers.sandbox-dashboard 0.2.2 -> 0.3.0.
      #   Milestone 3 shipped: the four lifecycle buttons
      #   (Import, Start, Save, Export) are now real actions,
      #   not stubs. Users can now drive the complete sandbox
      #   lab lifecycle from the dashboard without touching the
      #   CLI:
      #     * Import — pick a .tar.gz, collision-check, extract
      #     * Start  — pick a topology, sudo containerlab deploy,
      #                streaming progress toast
      #     * Save   — sudo containerlab save + bundle (keeps
      #                clab-* so captured configs make it into
      #                the tarball)
      #     * Export — bundle workspace as .tar.gz (excludes
      #                .git / node_modules / clab-*)
      # - Also adds: build-time syntax guardrail on the emitted
      #   webview script, sudo -n (non-interactive) defense so
      #   unconfigured NOPASSWD sudo fails fast with a clear
      #   diagnostic instead of hanging.
      # - Pure extension bump, no image layer changes below the
      #   extension install.
      # 1.0.5:
      # - Bump packetanglers.sandbox-dashboard 0.3.0 -> 0.4.0.
      #   Milestone 4 shipped, driven by user feedback from the
      #   v0.3.0 smoke test:
      #     * Stop button — fifth button in the actions row,
      #       runs `containerlab destroy --cleanup`. Three-way
      #       confirmation modal: Cancel / Save and Stop /
      #       Stop without Saving. Save-and-Stop captures
      #       running configs first; if save fails the lab is
      #       NOT torn down, preserving the user's intent.
      #     * GitHub clone for Import — Import opens with a
      #       picker (Upload File OR Clone from GitHub). Clone
      #       path wipes the workspace (with destructive-
      #       confirmation modal listing entries to delete) and
      #       runs `git clone <url> .`. Trusts code-server's
      #       auth flow; 30s "still working" hint, 5min hard
      #       timeout against a stuck clone.
      # - Bake VS Code default settings INTO the image at
      #   /home/coder/.local/share/code-server/User/settings.json
      #   instead of shipping per-lab .vscode/ directories.
      #   Cleaner separation: lab content (topology, configs)
      #   stays in the lab repo; editor preferences (theme,
      #   keybindings, terminal defaults) live with the image.
      #   Users can still override per-lab via .vscode/ if they
      #   want, but they're not forced to ship one.
      # - Pure additive change at the image layer below the
      #   extension install (settings.json copy is a new step;
      #   no other layers altered).
      # 1.0.6:
      # - Bump packetanglers.sandbox-dashboard 0.4.0 -> 0.4.1, a
      #   user-feedback-driven patch from the v0.4.0 smoke test:
      #     * After cloning a repo via Import, users hit the
      #       `git config user.name` / `user.email` wall the moment
      #       they tried to commit. They had to drop to a terminal
      #       to set those, breaking the low-friction lab promise.
      #     * v0.4.1 adds a "Set up Git for committing" capability
      #       surfaced through three triggers:
      #         (1) clone-time gate — runImportFromGitHub now prompts
      #             before the destructive workspace wipe; user
      #             cancel = clean abort
      #         (2) activation-time hook — when the workspace contains
      #             a .git directory AND identity is missing, a
      #             non-modal nudge appears 2s after auto-open
      #         (3) command palette — always-available, idempotent
      # - Honest about ephemerality: sandbox containers reset every
      #   launch, no persistence layer for git identity. Prompt
      #   fires once per session in workspaces where git matters.
      # - Pure extension bump.
      # 1.0.7:
      # - Bump packetanglers.sandbox-dashboard 0.4.1 -> 0.4.2, a
      #   second user-feedback-driven patch from the v0.4.1 smoke
      #   test. Two small but high-value adds:
      #     * Start fallback file picker — Start now has a three-
      #       step topology resolver (session memory → *.clab.yml
      #       glob discovery → fallback file picker for non-
      #       standard filenames). Repos with topology files named
      #       topology.yml, lab.yaml, etc. now "just work". Picked
      #       file is remembered for the lab session so subsequent
      #       Start clicks don't re-prompt.
      #     * Topology View button — sixth button in the actions
      #       row, dispatches to srl-labs' TopoViewer. Uses
      #       resilient dynamic command lookup (discover at
      #       runtime rather than hardcode) so future srl-labs
      #       renames don't break the button.
      # - Side effect: Start button no longer disabled when the
      #   dashboard's Topologies section is empty — the fallback
      #   picker handles that case directly.
      # - Pure extension bump.
      # 1.0.8:
      # - Bump packetanglers.sandbox-dashboard 0.4.2 -> 0.4.3, a
      #   third user-feedback-driven patch from the v0.4.2 smoke
      #   test. Two fixes in one release:
      #     * Topology View now actually opens. v0.4.2's button
      #       dispatched correctly but srl-labs' TopoViewer
      #       command discovers its target via active text editor
      #       URI, and our webview wasn't a text editor. Fix:
      #       pre-open the deployed lab's topology file as a
      #       preview tab to anchor the editor context before
      #       dispatching.
      #     * In-flight action tracking. Smoke logs revealed two
      #       concurrent containerlab deploy invocations racing
      #       on the same topology when the user double-clicked
      #       Start during a slow image pull. System-level fix:
      #       new in-flight registry + trackedCommand wrapper
      #       blocks concurrent invocations of all six button-
      #       bound commands. Buttons grey out and show a "..."
      #       suffix while their action runs. Catches palette/
      #       keybinding races too.
      # - Pure extension bump.
      # 1.0.9:
      # - Bump packetanglers.sandbox-dashboard 0.4.3 -> 0.4.4, a
      #   fourth user-feedback-driven patch from the v0.4.3 smoke
      #   test. v0.4.3's TopoViewer fix only worked for labs whose
      #   topology files matched the *.clab.yml convention — a
      #   constraint we discovered when smoke testing exposed it.
      #
      #   Root cause: srl-labs.vscode-containerlab's tree view
      #   discovers labs via files matching *.clab.yml /
      #   *.clab.yaml. Labs deployed from non-conforming filenames
      #   (lab.yml, topology.yaml) are invisible to their tree,
      #   which means TopoViewer can't dispatch against them. The
      #   v0.4.2 Start fallback picker (deploy any topology
      #   regardless of naming) inadvertently created a class of
      #   users srl-labs can't serve.
      #
      #   v0.4.4 solves it at Start time: when a non-conforming
      #   topology is selected, three-button modal appears BEFORE
      #   deploy:
      #     * Rename and Start: fs.rename to <stem>.clab.yml,
      #       update remembered topology, deploy. Collision
      #       detected (delete-existing-or-cancel sub-prompt).
      #     * Start without Renaming: deploy as-is; Topology View
      #       disabled per-lab in dashboard with explanatory
      #       tooltip.
      #     * Cancel: don't deploy.
      #
      #   Renaming BEFORE deploy is the only sane time;
      #   rename-after-deploy creates broken state because
      #   containerlab metadata is stamped with the original
      #   filename.
      #
      # - Per-lab Topology View enablement in the dashboard.
      #   Button now requires a deployed lab AND that lab to be
      #   conforming. Per-case tooltip explains the "why" instead
      #   of letting users click into a confusing srl-labs error.
      # - Pure extension bump.
      # 1.0.10:
      # - Bump packetanglers.sandbox-dashboard 0.4.4 -> 0.4.5,
      #   a fifth user-feedback-driven patch from the v0.4.4
      #   smoke test. v0.4.4 confirmed Topology View finally
      #   works end-to-end for conforming labs, but exposed a
      #   UX issue: the YAML file we open behind the scenes to
      #   anchor srl-labs' editor-context-discovery lingers in
      #   the editor pane afterward. A user clicking "Topology
      #   View" got the graph AND an unwanted YAML tab.
      # - Two coordinated changes:
      #     * Topology View smart-close: snapshot textDocuments
      #       BEFORE pre-open; if our target wasn't there, we
      #       opened it and we close it after dispatch via
      #       tabGroups.close(specificTab). Users who already
      #       had the YAML open have it left untouched.
      #     * New Open Topology File button (📝) sibling to
      #       Topology View. Opens the YAML as a normal (non-
      #       preview) editor tab for users who explicitly want
      #       to read or edit it. Uses the same three-step
      #       resolver as Start.
      # - Behind the scenes: refactored the topology resolver
      #   into a shared module so Start and Open Topology File
      #   share session memory and prompting logic.
      # - Pure extension bump.
      # 1.0.11:
      # - Bump packetanglers.sandbox-dashboard 0.4.5 -> 0.4.6,
      #   a sixth user-feedback-driven patch from the v0.4.5
      #   smoke test cycle. Save was doing too much: capturing
      #   running configs AND bundling the workspace as a
      #   tarball. v0.4.6 splits these cleanly so each does
      #   one thing.
      # - Save now does ONE thing: containerlab save against
      #   the deployed lab. The tarball-bundling logic is gone.
      #   Users who want a tarball use Export. Mental model:
      #     * Save Configs captures running state INTO the
      #       workspace
      #     * Export Lab bundles the workspace OUT as a tarball
      # - Save uses --copy startup-configs (containerlab 0.74+
      #   feature). Versioned, timestamped, symlinked-to-latest
      #   archive structure unlocks future iterate-save-stop-
      #   start-resume workflows when combined with topology
      #   magic variables (__clabLabName__, __clabNodeName__).
      # - Button label: "Save" -> "Save Configs". Clearer scope.
      # - Pure extension bump.
      # 1.0.12:
      # - Bump packetanglers.sandbox-dashboard 0.4.6 -> 0.4.7,
      #   first item from the user-feedback queue flush.
      # - Auto-hide auxiliary (secondary side) bar on activation.
      #   Lab-base-sandbox containers ship without any extensions
      #   that pin useful views into that right-side panel; it's
      #   empty visual clutter on lab launch. Now hidden
      #   automatically via workbench.action.closeAuxiliaryBar
      #   on every activation (the command is idempotent — safe
      #   to call unconditionally).
      # - VS Code does not expose a settings.json key for this
      #   (microsoft/vscode#198032 closed-as-duplicate); aux-bar
      #   visibility is runtime state. The extension-code path is
      #   the only viable approach.
      # - Pure extension bump.
      # 1.0.13:
      # - Bump packetanglers.sandbox-dashboard 0.4.7 -> 0.5.0,
      #   the first minor bump since v0.3.0. v0.4.x was nine
      #   releases of bug-and-polish; v0.5.0 marks new
      #   capability: the dashboard now closes the loop on
      #   lab work.
      # - Pre-v0.5.0:  Import → work → Export tarball → manual
      #                upload to share.
      # - Post-v0.5.0: Import from GitHub → work → Push to
      #                GitHub → re-import from GitHub later,
      #                anywhere.
      # - New 🚀 Push to GitHub button (eighth in the actions
      #   row, sibling to Export). Smart scenario detection:
      #   pristine workspace gets init+commit+push with sensible
      #   .gitignore defaults; already-a-git-repo workspace
      #   (e.g., from Import-from-GitHub) gets just commit+push.
      # - "Already up to date" stop for no-op pushes.
      # - [View on GitHub] action button in success toast.
      # - Tailored error hints for auth and non-fast-forward
      #   failures.
      # - Auth handled by code-server's git integration; no
      #   credentials managed by the extension.
      # - Pure extension bump.
      # 1.0.14:
      # - Bump packetanglers.sandbox-dashboard 0.5.0 -> 0.5.1, an
      #   honest fix for v0.5.0's silent-hang on git push.
      # - v0.5.0 spawned git push directly from the extension host
      #   without realizing code-server's GitHub auth provider
      #   doesn't reach our spawn context. git silently waited
      #   forever for credentials it had no way to acquire.
      #   Smoke testing 2026-04-26 caught it.
      # - User-led diagnostic (typing "publish" in code-server's
      #   command palette) revealed both Git: Publish Branch... AND
      #   Publish to GitHub are registered in lab-base-sandbox.
      #   The fix path: stop spawning git push ourselves; dispatch
      #   to VS Code's auth-aware commands instead.
      # - Three-path dispatch with feature detection:
      #     * github.publish (Microsoft's "Publish to GitHub")
      #       preferred for pristine workspaces — handles OAuth +
      #       repo creation + push in one magical flow
      #     * git.publish (vscode.git's "Git: Publish Branch") used
      #       when github.publish absent OR existing remote
      #     * git.push for existing-repo push
      # - Spawn fallback (with GIT_TERMINAL_PROMPT=0 + 5min timeout)
      #   only when no VS Code commands are registered. Unlikely to
      #   fire in lab-base-sandbox but exists for unusual environments.
      #   No more silent hangs.
      # - Two-stage success toast: immediate "Pushing..." dispatch,
      #   then background follow-up "Pushed to <url>" with [View on
      #   GitHub] action button when remote URL becomes detectable.
      # - The integration-shim playbook from v0.4.2-v0.4.5 now
      #   applies to VS Code's own internals, not just other
      #   extensions. Architectural lesson worth carrying forward.
      # - Pure extension bump.
      # 1.0.15:
      # - Bump packetanglers.sandbox-dashboard 0.5.1 -> 0.5.2,
      #   user-feedback patch from v0.5.1 multi-tester smoke testing.
      # - Three button label clarifications:
      #     "Open File" -> "Open Topology File"
      #     "Import"    -> "Import Workspace (tar)"
      #     "Export"    -> "Export Workspace (tar)"
      # - Import split into two distinct buttons. Pre-v0.5.2, Import
      #   was a router QuickPick ("tarball or GitHub clone?"). Multi-
      #   tester feedback: this was friction. v0.5.2 splits cleanly
      #   into Import Workspace (tar) and a NEW "Clone from GitHub"
      #   (🐙) button. Each does ONE thing.
      # - Actions row restructured into three semantic sub-rows
      #   to scale better than a flat row as buttons are added:
      #     Sources       — Import Workspace (tar), Clone from GitHub
      #     Lifecycle     — Start, Topology View, Open Topology File,
      #                     Stop, Save Configs
      #     Destinations  — Export Workspace (tar), Push to GitHub
      # - Future Arista buttons (CVaaS onboarding, cEOS downloader,
      #   ProLabs link) get natural homes in this layout.
      # - Internal: clone code path extracted to clone-from-github.ts;
      #   import.ts shrunk from 570 to 255 LOC.
      # - Item 4 from feedback (.gitignore safety check at Save time)
      #   deferred to D1 (magic-variable wiring) where the broader
      #   topology-modification UX gets designed coherently.
      # - Pure extension bump.
      # 1.0.16:
      # - Bump packetanglers.sandbox-dashboard 0.5.2 -> 0.6.0, the
      #   first minor bump since v0.5.0 and the largest single
      #   capability shipped to date.
      # - v0.6.0 makes the dashboard the first feature in this
      #   codebase that MODIFIES user-authored content (topology
      #   YAML and .gitignore). Different risk profile from the
      #   orchestration features in v0.4.x and v0.5.x.
      # - Magic-variable wiring for arista_ceos nodes:
      #   * After Save Configs (or via standalone palette command
      #     "Sandbox Dashboard: Wire Magic Variables"), dashboard
      #     offers to wire saved configs into the topology using
      #     containerlab's __clabLabName__ / __clabNodeName__
      #     magic variables. Lab auto-resumes with saved configs
      #     on next deploy.
      #   * Canonical line written:
      #       startup-config: startup-configs/__clabLabName__/__clabNodeName__/startup-config
      #   * Single bundled confirmation modal lists all proposed
      #     changes (topology edits + .gitignore amendment +
      #     skipped nodes with reasons) BEFORE any file mutation.
      #   * Defensive: only wires if the saved config file actually
      #     exists on disk. Don't write paths to nonexistent files.
      # - .gitignore safety: if .gitignore lacks a !startup-configs
      #   negation pattern, propose adding !startup-configs/* so
      #   saved configs travel with the lab repo.
      # - Per-kind handler architecture (KIND_RULES registry)
      #   designed for extension. v0.6.0 ships arista_ceos only;
      #   nokia_srlinux, nokia_sros, juniper_vmx etc. become
      #   drop-in additions when user demand emerges.
      # - New runtime dep: yaml@^2.8.3 (eemeli/yaml) for round-
      #   tripping with comment preservation. Bundle 87KB -> 209KB.
      # - The verify-then-design pattern from v0.4.x retrospective
      #   saved us from a silently-broken release: user caught my
      #   incorrect magic-var path during design (had `flash/`
      #   segment that doesn't belong in --copy destination paths).
      # - Pure extension bump.
      # 1.0.17:
      # - Bump packetanglers.sandbox-dashboard 0.6.0 -> 0.6.1, hotfix
      #   for the v0.6.0 Save Configs hang.
      # - v0.6.0 awaited the Save success toast before dispatching
      #   the magic-variable wiring flow. Smoke testing 2026-04-26
      #   with a 13-node EVPN gateway demo lab revealed the issue:
      #   showInformationMessage's promise stays pending if the user
      #   lets the toast auto-dismiss without clicking a button. The
      #   await blocked everything downstream, including the wire-
      #   magic-vars dispatch AND the trackedCommand cleanup. Save
      #   Configs button stuck on "Save Configs…" forever, no modal
      #   appeared.
      # - v0.6.1 fix: fire the toast non-blockingly via void + .then.
      #   The View Log handler still works; wire-magic-vars dispatches
      #   immediately; button stops sticking. Toast (corner) and
      #   modal (center) coexist visually — probably better UX than
      #   the v0.6.0 sequential design anyway.
      # - Recurring lesson: don't await non-modal toasts when there's
      #   downstream work. Notifications are fire-and-forget unless
      #   you explicitly need the user's button choice.
      # - Pure extension bump.
      # 1.0.18:
      # - Bump packetanglers.sandbox-dashboard 0.6.1 -> 0.7.0, the
      #   second content-modification feature in the codebase and the
      #   first DESTRUCTIVE one (replaces user-authored values, not
      #   just adds keys).
      # - Surfaced by real-world testing 2026-04-26 against the EVPN
      #   gateway demo lab where every cEOS node had a static
      #   reference config (startup-config: configs/A-SPINE.cfg). Two
      #   distinct issues from one test scenario:
      #     1. No path to migrate from static refs to magic-var
      #        auto-resume (just got silently skipped as
      #        "already-wired")
      #     2. No visible feedback when wire-magic-vars no-ops
      #        post-Save (users wondered if anything happened)
      #   Both addressed in v0.7.0.
      # - Static→magic-var migration: wire-magic-vars now offers to
      #   REPLACE existing static startup-config: values with the
      #   magic-var form. Original values preserved as YAML comments
      #   above the migrated key (e.g. "# was: startup-config:
      #   configs/A-SPINE.cfg (replaced by Sandbox Dashboard
      #   2026-04-27)") for trivial manual revert.
      # - Visible no-op feedback: post-Save trigger now always shows
      #   a brief info toast on no-op (e.g. "No magic-variable wiring
      #   needed. 9 already on auto-resume.") so users know we
      #   checked.
      # - Permissive magic-var detection: any value containing
      #   __clabNodeName__ is treated as user's deliberate auto-
      #   resume setup and left alone absolutely. We don't normalize
      #   variants to a canonical form.
      # - Modal restructured with up to three sections (Add wiring /
      #   Migrate to auto-resume / .gitignore changes) that adapt
      #   based on what's being proposed.
      # - New architectural pattern: destructive-but-transparent.
      #   When modifying authored values, leave a comment trail.
      #   Costs file clutter; gains trust + manual revertability.
      # - Pure extension bump.
      # 1.0.19:
      # - Bump packetanglers.sandbox-dashboard 0.7.0 -> 0.8.0, the
      #   first vendor-specific on-ramp in the dashboard.
      # - New "Arista Integrations" sub-row appears below Destinations
      #   in the actions section. First button in it:
      #     ☁️  Reserve a CVaaS Tenant
      #   Opens https://labs.arista.com/prolabs/cvaas-reservation in
      #   the user's browser via vscode.env.openExternal.
      # - Architectural firsts in v0.8.0:
      #     * src/actions/arista/ subdirectory for vendor-specific
      #       actions, separate from the vendor-neutral core
      #     * First always-enabled button (no workspace/lab gating)
      #     * First action that just opens an external URL
      # - v0.8.x roadmap (not yet shipped):
      #     v0.8.1 — cEOS downloader via ardl
      #     v0.8.2 — CVaaS device onboarding (daemon TerminAttr)
      # - Vendor-specific code segregation keeps the dashboard
      #   vendor-neutral at its core. If non-Arista vendor
      #   integrations emerge (Nokia, Juniper, etc.), they get their
      #   own subdirectories and sub-rows.
      # - Pure extension bump.
      # 1.0.20:
      # - Bump packetanglers.sandbox-dashboard 0.8.0 -> 0.8.1, the
      #   middle Arista vendor on-ramp.
      # - 🔽 Download cEOS Image button now appears in the Arista
      #   Integrations sub-row. Wraps ardl (the eos-downloader CLI;
      #   pre-installed in this container) in a friendly dashboard
      #   flow:
      #     1. Prompt for cEOS version (e.g. 4.35.4M), validated
      #        against Arista's release format 4.X.Y[.Z](F|M)
      #     2. Defensive Docker cache check; if image already
