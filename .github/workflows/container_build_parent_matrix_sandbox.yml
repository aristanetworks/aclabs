---
name: build lab-base-sandbox images

on:
  push:
    branches: ['**']  # branches will be filtered in the jobs
    paths:
      - .github/workflows/container_build_child.yml
      - .github/workflows/container_build_parent_matrix_sandbox.yml
      - containers/lab-base-sandbox/**
  workflow_dispatch:
    branches: ['**']  # branches will be filtered in the jobs

permissions:
  packages: write

jobs:
  build-lab-containers:
    # fork - build container from any branch for testing
    # parent repo - build on main branch only
    if: github.repository != 'aristanetworks/acLabs' || github.ref == 'refs/heads/main'
    uses: ./.github/workflows/container_build_child.yml
    strategy:
      matrix:
        from_image: ["ghcr.io/aristanetworks/avd/universal"]
        from_variant: ["python3.12-avd-v5.7.3", "python3.12-avd-v6.1.0"]
        clab_version: ["0.74.3"]
        user_id: ["1000", "1009"]
        include:
          - user_id: "1000"
            group_id: "1000"
          - user_id: "1009"
            group_id: "1009"
    with:
      container_name: lab-base-sandbox
      from_image: ${{ matrix.from_image }}
      from_variant: ${{ matrix.from_variant }}
      clab_version: ${{ matrix.clab_version }}
      user_id: ${{ matrix.user_id }}
      group_id: ${{ matrix.group_id }}
      # 1.0.0:
      # - Initial release of lab-base-sandbox, sister image to
      #   lab-base-techlib. Same OS layer, code-server, ContainerLab,
      #   and Python deps; differs in two ways:
      #     1. Bakes packetanglers.sandbox-dashboard 0.1.0 instead of
      #        lab-dashboard. Sandbox is a stateful long-lived control
      #        plane (import / start / save / export), techlib is a
      #        write-once status renderer. Different jobs.
      #     2. Does NOT ship /bin/init_lab.py or /bin/docs_generate.py.
      #        The sandbox lab doesn't auto-deploy a topology; the user
      #        drives the lifecycle from the dashboard, so there's
      #        nothing for init_lab to wait for at boot.
      # - Pinned extension versions match lab-base-techlib for
      #   reproducibility (srl-labs.vscode-containerlab@0.24.2,
      #   tuxtina.json2yaml@0.2.0, yzhang.markdown-all-in-one@3.6.2).
      # - Inherits the 3-attempt retry loop for OpenVSX installs.
      # 1.0.1:
      # - Bump packetanglers.sandbox-dashboard 0.1.0 -> 0.2.0, adding
      #   live workspace awareness to the bundled extension:
      #     * auto-open on first activation per workspace
      #     * topology file discovery with subfolder grouping
      #     * containerlab inspection + 30s polling reactivity
      #     * file-watcher for *.clab.yml changes
      #     * display polish (empty states, live timestamps, error
      #       banner, running-lab indicator)
      # - No base OS / code-server / containerlab / Python-deps
      #   changes. This is a pure extension bump.
      # 1.0.2:
      # - Bump packetanglers.sandbox-dashboard 0.2.0 -> 0.2.1, a
      #   hotfix release. 0.2.0 shipped with a malformed string
      #   literal in the webview JS (cross-platform path-splitting
      #   code for topology grouping), which killed the entire
      #   inline script and stuck all three dashboard sections on
      #   "Computing…" forever. 0.2.1 restores the correct
      #   escaping and the dashboard renders as intended.
      # - Pure extension bump, no image layer changes below the
      #   extension install.
      # 1.0.3:
      # - Bump packetanglers.sandbox-dashboard 0.2.1 -> 0.2.2, a
      #   second hotfix. 0.2.1 correctly rendered the dashboard
      #   but its containerlab inspect JSON parser was written
      #   against an older shape assumption; against current
      #   containerlab 0.74+, every poll surfaced "unrecognized
      #   JSON shape" in the ContainerLab section. 0.2.2 teaches
      #   the parser about the current keyed-by-lab_name shape.
      # - Pure extension bump.
      # 1.0.4:
      # - Bump packetanglers.sandbox-dashboard 0.2.2 -> 0.3.0.
      #   Milestone 3 shipped: the four lifecycle buttons
      #   (Import, Start, Save, Export) are now real actions,
      #   not stubs. Users can now drive the complete sandbox
      #   lab lifecycle from the dashboard without touching the
      #   CLI:
      #     * Import — pick a .tar.gz, collision-check, extract
      #     * Start  — pick a topology, sudo containerlab deploy,
      #                streaming progress toast
      #     * Save   — sudo containerlab save + bundle (keeps
      #                clab-* so captured configs make it into
      #                the tarball)
      #     * Export — bundle workspace as .tar.gz (excludes
      #                .git / node_modules / clab-*)
      # - Also adds: build-time syntax guardrail on the emitted
      #   webview script, sudo -n (non-interactive) defense so
      #   unconfigured NOPASSWD sudo fails fast with a clear
      #   diagnostic instead of hanging.
      # - Pure extension bump, no image layer changes below the
      #   extension install.
      # 1.0.5:
      # - Bump packetanglers.sandbox-dashboard 0.3.0 -> 0.4.0.
      #   Milestone 4 shipped, driven by user feedback from the
      #   v0.3.0 smoke test:
      #     * Stop button — fifth button in the actions row,
      #       runs `containerlab destroy --cleanup`. Three-way
      #       confirmation modal: Cancel / Save and Stop /
      #       Stop without Saving. Save-and-Stop captures
      #       running configs first; if save fails the lab is
      #       NOT torn down, preserving the user's intent.
      #     * GitHub clone for Import — Import opens with a
      #       picker (Upload File OR Clone from GitHub). Clone
      #       path wipes the workspace (with destructive-
      #       confirmation modal listing entries to delete) and
      #       runs `git clone <url> .`. Trusts code-server's
      #       auth flow; 30s "still working" hint, 5min hard
      #       timeout against a stuck clone.
      # - Bake VS Code default settings INTO the image at
      #   /home/coder/.local/share/code-server/User/settings.json
      #   instead of shipping per-lab .vscode/ directories.
      #   Cleaner separation: lab content (topology, configs)
      #   stays in the lab repo; editor preferences (theme,
      #   keybindings, terminal defaults) live with the image.
      #   Users can still override per-lab via .vscode/ if they
      #   want, but they're not forced to ship one.
      # - Pure additive change at the image layer below the
      #   extension install (settings.json copy is a new step;
      #   no other layers altered).
      # 1.0.6:
      # - Bump packetanglers.sandbox-dashboard 0.4.0 -> 0.4.1, a
      #   user-feedback-driven patch from the v0.4.0 smoke test:
      #     * After cloning a repo via Import, users hit the
      #       `git config user.name` / `user.email` wall the moment
      #       they tried to commit. They had to drop to a terminal
      #       to set those, breaking the low-friction lab promise.
      #     * v0.4.1 adds a "Set up Git for committing" capability
      #       surfaced through three triggers:
      #         (1) clone-time gate — runImportFromGitHub now prompts
      #             before the destructive workspace wipe; user
      #             cancel = clean abort
      #         (2) activation-time hook — when the workspace contains
      #             a .git directory AND identity is missing, a
      #             non-modal nudge appears 2s after auto-open
      #         (3) command palette — always-available, idempotent
      # - Honest about ephemerality: sandbox containers reset every
      #   launch, no persistence layer for git identity. Prompt
      #   fires once per session in workspaces where git matters.
      # - Pure extension bump.
      # 1.0.7:
      # - Bump packetanglers.sandbox-dashboard 0.4.1 -> 0.4.2, a
      #   second user-feedback-driven patch from the v0.4.1 smoke
      #   test. Two small but high-value adds:
      #     * Start fallback file picker — Start now has a three-
      #       step topology resolver (session memory → *.clab.yml
      #       glob discovery → fallback file picker for non-
      #       standard filenames). Repos with topology files named
      #       topology.yml, lab.yaml, etc. now "just work". Picked
      #       file is remembered for the lab session so subsequent
      #       Start clicks don't re-prompt.
      #     * Topology View button — sixth button in the actions
      #       row, dispatches to srl-labs' TopoViewer. Uses
      #       resilient dynamic command lookup (discover at
      #       runtime rather than hardcode) so future srl-labs
      #       renames don't break the button.
      # - Side effect: Start button no longer disabled when the
      #   dashboard's Topologies section is empty — the fallback
      #   picker handles that case directly.
      # - Pure extension bump.
      # 1.0.8:
      # - Bump packetanglers.sandbox-dashboard 0.4.2 -> 0.4.3, a
      #   third user-feedback-driven patch from the v0.4.2 smoke
      #   test. Two fixes in one release:
      #     * Topology View now actually opens. v0.4.2's button
      #       dispatched correctly but srl-labs' TopoViewer
      #       command discovers its target via active text editor
      #       URI, and our webview wasn't a text editor. Fix:
      #       pre-open the deployed lab's topology file as a
      #       preview tab to anchor the editor context before
      #       dispatching.
      #     * In-flight action tracking. Smoke logs revealed two
      #       concurrent containerlab deploy invocations racing
      #       on the same topology when the user double-clicked
      #       Start during a slow image pull. System-level fix:
      #       new in-flight registry + trackedCommand wrapper
      #       blocks concurrent invocations of all six button-
      #       bound commands. Buttons grey out and show a "..."
      #       suffix while their action runs. Catches palette/
      #       keybinding races too.
      # - Pure extension bump.
      # 1.0.9:
      # - Bump packetanglers.sandbox-dashboard 0.4.3 -> 0.4.4, a
      #   fourth user-feedback-driven patch from the v0.4.3 smoke
      #   test. v0.4.3's TopoViewer fix only worked for labs whose
      #   topology files matched the *.clab.yml convention — a
      #   constraint we discovered when smoke testing exposed it.
      #
      #   Root cause: srl-labs.vscode-containerlab's tree view
      #   discovers labs via files matching *.clab.yml /
      #   *.clab.yaml. Labs deployed from non-conforming filenames
      #   (lab.yml, topology.yaml) are invisible to their tree,
      #   which means TopoViewer can't dispatch against them. The
      #   v0.4.2 Start fallback picker (deploy any topology
      #   regardless of naming) inadvertently created a class of
      #   users srl-labs can't serve.
      #
      #   v0.4.4 solves it at Start time: when a non-conforming
      #   topology is selected, three-button modal appears BEFORE
      #   deploy:
      #     * Rename and Start: fs.rename to <stem>.clab.yml,
      #       update remembered topology, deploy. Collision
      #       detected (delete-existing-or-cancel sub-prompt).
      #     * Start without Renaming: deploy as-is; Topology View
      #       disabled per-lab in dashboard with explanatory
      #       tooltip.
      #     * Cancel: don't deploy.
      #
      #   Renaming BEFORE deploy is the only sane time;
      #   rename-after-deploy creates broken state because
      #   containerlab metadata is stamped with the original
      #   filename.
      #
      # - Per-lab Topology View enablement in the dashboard.
      #   Button now requires a deployed lab AND that lab to be
      #   conforming. Per-case tooltip explains the "why" instead
      #   of letting users click into a confusing srl-labs error.
      # - Pure extension bump.
      # 1.0.10:
      # - Bump packetanglers.sandbox-dashboard 0.4.4 -> 0.4.5,
      #   a fifth user-feedback-driven patch from the v0.4.4
      #   smoke test. v0.4.4 confirmed Topology View finally
      #   works end-to-end for conforming labs, but exposed a
      #   UX issue: the YAML file we open behind the scenes to
      #   anchor srl-labs' editor-context-discovery lingers in
      #   the editor pane afterward. A user clicking "Topology
      #   View" got the graph AND an unwanted YAML tab.
      # - Two coordinated changes:
      #     * Topology View smart-close: snapshot textDocuments
      #       BEFORE pre-open; if our target wasn't there, we
      #       opened it and we close it after dispatch via
      #       tabGroups.close(specificTab). Users who already
      #       had the YAML open have it left untouched.
      #     * New Open Topology File button (📝) sibling to
      #       Topology View. Opens the YAML as a normal (non-
      #       preview) editor tab for users who explicitly want
      #       to read or edit it. Uses the same three-step
      #       resolver as Start.
      # - Behind the scenes: refactored the topology resolver
      #   into a shared module so Start and Open Topology File
      #   share session memory and prompting logic.
      # - Pure extension bump.
      # 1.0.11:
      # - Bump packetanglers.sandbox-dashboard 0.4.5 -> 0.4.6,
      #   a sixth user-feedback-driven patch from the v0.4.5
      #   smoke test cycle. Save was doing too much: capturing
      #   running configs AND bundling the workspace as a
      #   tarball. v0.4.6 splits these cleanly so each does
      #   one thing.
      # - Save now does ONE thing: containerlab save against
      #   the deployed lab. The tarball-bundling logic is gone.
      #   Users who want a tarball use Export. Mental model:
      #     * Save Configs captures running state INTO the
      #       workspace
      #     * Export Lab bundles the workspace OUT as a tarball
      # - Save uses --copy startup-configs (containerlab 0.74+
      #   feature). Versioned, timestamped, symlinked-to-latest
      #   archive structure unlocks future iterate-save-stop-
      #   start-resume workflows when combined with topology
      #   magic variables (__clabLabName__, __clabNodeName__).
      # - Button label: "Save" -> "Save Configs". Clearer scope.
      # - Pure extension bump.
      container_revision: "1.0.11"
