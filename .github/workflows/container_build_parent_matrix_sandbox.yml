      #   thought /sandbox was a known repository. The next clone's
      #   API correctly placed files at parentPath/<repo-name>/ but
      #   RETURNED /sandbox as the URI. Our promote logic then
      #   operated on the workspace root (no-op rename loop) and our
      #   cleanup recursively deleted the staging dir which contained
      #   the actual cloned content.
