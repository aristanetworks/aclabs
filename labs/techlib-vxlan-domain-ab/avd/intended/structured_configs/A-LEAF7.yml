route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
- name: RM-AS65000-IPV4-OUT
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-GATEWAY-LOOP
- name: RM-MLAG-PEER-OUT
  sequence_numbers:
  - sequence: 10
    type: deny
    description: Deny routes learned from MLAG peer that already carry an EVPN-imported route-target
    match:
    - extcommunity evpn-imported
  - sequence: 20
    type: permit
    description: Mark MLAG-peer-originated routes as origin incomplete so remote VTEPs prefer paths via a direct spine
    set:
    - origin incomplete
