---
###################################################
# Domain A — Fabric shape
#
# eBGP underlay (per-node ASN) + eBGP EVPN overlay
# MLAG multihoming on standard leafs (Multi-VTEP MLAG)
# All-Active EVPN Gateway on A-LEAF7/8
# IPv4 fabric addressing, dual-stack overlay IRB
#
# Rendered configs must match:
#   docs/data_center/evpnvxlan/deployment_guide/domains_a_b/full_configs/A-*.cfg
# in the aristanetworks/tech-library repo.
###################################################

fabric_name: DOMAIN_A_FABRIC

# PARITY-LEDGER class 16 — the guide's MLAG naming dialect: one trunk
# group `MLAG_PEER` for all peering VLANs, and explicit VLAN names.
# Descriptions are parity-exempt; only names/trunk-groups are set.
trunk_groups:
  mlag:
    name: MLAG_PEER
  mlag_l3:
    name: MLAG_PEER
mlag_peer_vlan_name: MLAG_PEER_SYNC
mlag_peer_l3_vlan_name: MLAG_PEER_L3_UNDERLAY
mlag_peer_l3_vrf_vlan_name: MLAG_PEER_VRF_{vrf}

# Suppress the AVD-default `transceiver qsfp default-mode 4x10G` line on
# spines/leafs. Tech-library doesn't render this on Domain A/B nodes
# (only on BACKBONE where AVD's default is correct).
custom_structured_configuration_transceiver_qsfp_default_mode_4x10: null

###################################################
# BGP knobs (fabric-wide)
###################################################

bgp_distance:
  external_routes: 20
  internal_routes: 200
  local_routes: 200

bgp_peer_groups:
  ipv4_underlay_peers:
    name: LOCAL-IPV4-PEERS
    password: DGMjRCIj8IZAFhehikpUIQ==
  mlag_ipv4_underlay_peer:
    name: MLAG-IPV4-PEER
    password: CRkxra9QRmU5k9/wECPlUA==
  evpn_overlay_peers:
    name: LOCAL-EVPN-PEERS
    password: WzKnNSduqwPYvUePYIh40g==
    bfd: true
  evpn_overlay_core:
    name: REMOTE-EVPN-PEERS
    password: IO6gE/ln7Sp2wt33WX/Asg==

# ebgp-multihop is a fabric-level setting in AVD 6.3 (not per peer-group).
evpn_ebgp_multihop: 3

bgp_update_wait_install: true
evpn_import_pruning: true
evpn_multicast: true

###################################################
# Address pools (aligned with tech-library schema)
#
# Loopback0 : 10.0.1.[NodeID]/32   (Globally Unique Address)
# Loopback1 : 10.1.1.[NodeID]/32   (Unique VTEP IP)
# Loopback2 : 10.2.1.[Pair-Primary-NodeID]/32   (MLAG Shared VTEP IP)
# Underlay  : 192.168.0.0/24 (/31 point-to-points, Spine↔Leaf)
# WAN uplink: 172.16.1.0/24 (/31 point-to-points, Gateway↔BB1/BB2)
# MLAG sync : 169.254.0.0/30 (VLAN 4094)
# MLAG L3   : 192.0.0.0/31   (VLAN 4093)
# MLAG VRF  : 192.0.0.0/31   (VLAN 3001 PROD, VLAN 3002 DEV — same subnet reused per VRF)
# OISM (PROD): Loopback101, 10.101.101.[NodeID]/32, underlay SSM group 232.1.1.1
# OISM (DEV) : Loopback102, 10.102.102.[NodeID]/32, underlay SSM group 232.1.1.2
###################################################

fabric_ip_addressing:
  mlag:
    algorithm: same_subnet   # produces 169.254.0.1/30 + 169.254.0.2/30 on the /30 sync VLAN

router_id_loopback_description: "Globally Unique Address"
vtep_loopback_description: "Unique VTEP IP"

# BGP peer description templates — match tech-library `A-LEAF1.EVPN`
# and `A-LEAF2.IPV4` style rather than AVD default `A-LEAF1_Loopback0` /
# `A-LEAF1_Ethernet1`.
overlay_bgp_peer_description: "{peer}.EVPN"
mlag_bgp_peer_description: "{mlag_peer}.IPV4"
default_vrf_diag_loopback_description: "OISM PIM/IGMP Source"

underlay_multicast_pim_sm: true

###################################################
# Custom Structured Config — VTEP-side
#
# CSC: DHCP relay tuning — dual suppress (tunnel + MLAG peer-link) required for
# distributed-IRB + MLAG deployments to prevent duplicate DHCP relays.
###################################################
custom_vtep_dhcp_relay:
  tunnel_requests_disabled: true
  mlag_peerlink_requests_disabled: true

custom_vtep_ip_dhcp_relay:
  information_option: true

# CSC: extcommunity list used by RM-MLAG-PEER-OUT to filter routes learned from
# the MLAG peer that already carry a route-target (i.e. were originated by the
# MLAG peer and imported via EVPN — don't re-advertise back over the peer-link).
custom_vtep_ext_community_lists:
  - name: evpn-imported
    entries:
      - type: permit
        regexp: RT.*

custom_vtep_route_maps:
  - name: RM-MLAG-PEER-OUT
    sequence_numbers:
      - sequence: 10
        type: deny
        match:
          - extcommunity evpn-imported
        description: Deny routes learned from MLAG peer that already carry an EVPN-imported route-target
      - sequence: 20
        type: permit
        set:
          - origin incomplete
        description: Mark MLAG-peer-originated routes as origin incomplete so remote VTEPs prefer paths via a direct spine

###################################################
# Custom Structured Config — Gateway-side (A-LEAF7/A-LEAF8)
#
# CSC: EVPN Gateway pair needs a WAN-facing IPv4 eBGP session to BB1/BB2 to
# advertise the Gateway loopbacks (Loopback0, Loopback1) into the backbone.
# AVD's evpn_gateway.remote_peers handles the EVPN peering, but not the
# separate IPv4 unicast session or the outbound route filtering. All the
# gateway-specific plumbing (peer-group, prefix-list, route-map, d-path
# bestpath, local-as trick to peer with BB in AS 65000) lives here.
###################################################
custom_evpn_gw_bgp_config:
  address_family_ipv4:
    peer_groups:
      - name: REMOTE-IPV4-PEERS
        activate: true
  address_family_evpn:
    domain_identifier: '1:1'
    domain_identifier_remote: '99:99'
  bgp:
    bestpath:
      d_path: true
  peer_groups:
    - name: REMOTE-IPV4-PEERS
      password: dkvBq1jk4inJHsHfMjYRnQ==
      remote_as: 65000
      route_map_out: RM-AS65000-IPV4-OUT
      send_community: all
    - name: REMOTE-EVPN-PEERS
      local_as: 65000
      # Note: the REMOTE-EVPN-PEERS peer-group is created by evpn_gateway.remote_peers;
      # local_as is layered on top here so the AS 65107/65108 Gateway can peer with the
      # AS 65000 backbone RRs as-if in AS 65000.

# CSC: PL-GATEWAY-LOOP restricts the Gateway's WAN advertisements to just the
# four loopback addresses (Loopback0 + Loopback1 for both A-LEAF7 and A-LEAF8).
# With EVPN Gateway in place, VTEPs in different domains don't need underlay
# reachability to each other — only the Gateway loopbacks need to leave the
# local domain.
custom_evpn_gw_prefix_lists:
  - name: PL-GATEWAY-LOOP
    sequence_numbers:
      - sequence: 10
        action: permit 10.0.1.7/32
      - sequence: 20
        action: permit 10.0.1.8/32
      - sequence: 30
        action: permit 10.1.1.7/32
      - sequence: 40
        action: permit 10.1.1.8/32

custom_evpn_gw_route_maps:
  - name: RM-AS65000-IPV4-OUT
    sequence_numbers:
      - sequence: 10
        type: permit
        match:
          - ip address prefix-list PL-GATEWAY-LOOP

# Per-Gateway WAN-facing eBGP neighbors to BB1/BB2 in AS 65000.
# Structured-config injected onto A-LEAF7 / A-LEAF8 via node-level structured_config
# reference in the l3leaf.node_groups.POD4.nodes section below.
a_leaf7_dci_bgp_peers:
  router_bgp:
    neighbors:
      - ip_address: 172.16.1.0
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.1.4
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4

a_leaf8_dci_bgp_peers:
  router_bgp:
    neighbors:
      - ip_address: 172.16.1.2
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.1.6
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4

###################################################
# Custom Structured Config — Spine multicast
#
# CSC: enable IPv4 multicast routing on the spines so PIM-SSM (S,G) trees for
# OISM overlay multicast can be forwarded through the underlay.
###################################################
csc_spine_multicast:
  ipv4:
    routing: true
    # NOTE: `software-forwarding sfe` under router multicast ipv4 was
    # required on EOS < 4.36 for OISM. In 4.36+ it's implicit; tech-library
    # omits the line entirely. Not rendered here to match.

###################################################
# Custom Structured Config — PL-P2P-UNDERLAY + RM-CONN-2-BGP permit 20
#
# Tech-library A/B spines + leafs redistribute BOTH loopbacks AND the
# fabric point-to-point /31 subnets into BGP. AVD only redistributes
# loopbacks by default. Add the second prefix-list + route-map stanza.
# Applied fabric-wide via custom_structured_configuration_*.
###################################################

custom_structured_configuration_prefix_lists:
  - name: PL-P2P-UNDERLAY
    sequence_numbers:
      - sequence: 10
        action: permit 192.168.0.0/24 le 31

custom_structured_configuration_route_maps:
  - name: RM-CONN-2-BGP
    sequence_numbers:
      - sequence: 20
        type: permit
        match:
          - ip address prefix-list PL-P2P-UNDERLAY

###################################################
# Custom Structured Config — peer-tag SPINES
#
# CSC: BGP Peer Tagging (EOS 4.34.0F). Prevents leaf-side re-advertisement of
# routes learned from one spine to another. AVD 6.3 exposes this natively as
# `peer_tag_in` + `peer_tag_out_discard` under each peer_group's
# structured_config.
###################################################
csc_leaf_peer_tag_spines:
  router_bgp:
    peer_groups:
      - name: LOCAL-IPV4-PEERS
        peer_tag_in: SPINES
        peer_tag_out_discard: SPINES
      - name: LOCAL-EVPN-PEERS
        peer_tag_in: SPINES
        peer_tag_out_discard: SPINES

###################################################
# Custom Structured Config — paired redistribute-router-mac + Multi-VTEP MLAG
#
# CSC #1 (paired redistribute-router-mac): the anycast gateway
# advertisement mechanism from EOS 4.34.0F. Injected under each MAC-VRF
# on standard leafs ONLY (not the Gateway pair, which lets remote-domain
# reachability come through the Interconnect-ESI machinery instead).
#
# CSC #2 (Multi-VTEP MLAG Loopback2): the MLAG shared VTEP loopback
# for the Multi-VTEP MLAG pattern. Both peers in an MLAG pair share the
# same Loopback2 IP; both peers' Vxlan1 uses `vxlan mlag source-interface
# Loopback2` for MLAG-attached hosts while `vxlan source-interface
# Loopback1` remains the per-node unique VTEP source for OISM.
#
# These are combined per-POD because the VLAN set differs per POD.
###################################################

# POD1 (A-LEAF1/2): VLANs 10, 30. MLAG shared VTEP = 10.2.1.1/32
csc_pod1_leaf_features:
  loopback_interfaces:
    - name: Loopback2
      description: MLAG Shared VTEP IP
      ip_address: 10.2.1.1/32
  vxlan_interface:
    vxlan1:
      vxlan:
        source_interface: Loopback1
        mlag_source_interface: Loopback2
        virtual_router_encapsulation_mac_address: mlag-system-id
  router_bgp:
    vlans:
      - id: 10
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary
      - id: 30
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary

# POD2 (A-LEAF3/4): VLANs 10, 30, 50. MLAG shared VTEP = 10.2.1.3/32
csc_pod2_leaf_features:
  loopback_interfaces:
    - name: Loopback2
      description: MLAG Shared VTEP IP
      ip_address: 10.2.1.3/32
  vxlan_interface:
    vxlan1:
      vxlan:
        source_interface: Loopback1
        mlag_source_interface: Loopback2
        virtual_router_encapsulation_mac_address: mlag-system-id
  router_bgp:
    vlans:
      - id: 10
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary
      - id: 30
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary
      - id: 50
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary

# POD3 (A-LEAF5/6): VLANs 50, 70. MLAG shared VTEP = 10.2.1.5/32
csc_pod3_leaf_features:
  loopback_interfaces:
    - name: Loopback2
      description: MLAG Shared VTEP IP
      ip_address: 10.2.1.5/32
  vxlan_interface:
    vxlan1:
      vxlan:
        source_interface: Loopback1
        mlag_source_interface: Loopback2
        virtual_router_encapsulation_mac_address: mlag-system-id
  router_bgp:
    vlans:
      - id: 50
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary
      - id: 70
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary

###################################################
# DOMAIN A SPINES
###################################################
spine:
  defaults:
    platform: cEOS-LAB
    bgp_as: 65100
    loopback_ipv4_pool: 10.0.1.0/24
    structured_config:
      router_multicast: "{{ csc_spine_multicast }}"
  nodes:
    # Per-spine downlink_pools override AVD's default per-leaf offset
    # assignment. Each spine gets a /28 (16 addresses = 8 /31 links,
    # Et1..Et8). Matches tech-library scheme:
    #   A-SPINE1 Et1..Et8 → 192.168.0.0/2/4/6/8/10/12/14 (0-14)
    #   A-SPINE2 Et1..Et8 → 192.168.0.16/18/20/22/24/26/28/30
    #   A-SPINE3 Et1..Et8 → 192.168.0.32/34/36/38/40/42/44/46
    #   A-SPINE4 Et1..Et8 → 192.168.0.48/50/52/54/56/58/60/62
    - name: A-SPINE1
      id: 201
      mgmt_ip: 172.100.101.101/22
      downlink_pools:
        - ipv4_pool: 192.168.0.0/28
          downlink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]
    - name: A-SPINE2
      id: 202
      mgmt_ip: 172.100.101.102/22
      downlink_pools:
        - ipv4_pool: 192.168.0.16/28
          downlink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]
    - name: A-SPINE3
      id: 203
      mgmt_ip: 172.100.101.103/22
      downlink_pools:
        - ipv4_pool: 192.168.0.32/28
          downlink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]
    - name: A-SPINE4
      id: 204
      mgmt_ip: 172.100.101.104/22
      downlink_pools:
        - ipv4_pool: 192.168.0.48/28
          downlink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4, Ethernet5, Ethernet6, Ethernet7, Ethernet8]

##################################################
# DOMAIN A LEAFS
##################################################
l3leaf:
  defaults:
    platform: cEOS-LAB
    loopback_ipv4_pool: 10.0.1.0/24
    vtep_loopback: Loopback1                       # explicit VTEP source loopback
    vtep_loopback_ipv4_pool: 10.1.1.0/24
    # NOTE: Multi-VTEP MLAG shared VTEP (Loopback2) has no native AVD 6.3 key.
    # Injected via structured_config on the MLAG l3leaf node_groups (see below).
    # Target render: interface Loopback2 with 10.2.1.[MLAG-Pair-Primary-NodeID]/32
    # + `vxlan mlag source-interface Loopback2` on Vxlan1.
    uplink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]
    uplink_switches: [A-SPINE1, A-SPINE2, A-SPINE3, A-SPINE4]
    # No uplink_ipv4_pool — each spine defines its own downlink_pools that
    # allocate exact tech-library IPs per interface.
    mlag_interfaces: [Ethernet5, Ethernet6]
    mlag_peer_ipv4_pool: 169.254.0.0/30
    mlag_peer_l3_ipv4_pool: 192.0.0.0/31
    mlag_port_channel_id: 1000
    virtual_router_mac_address: 00:1c:73:00:00:01
    spanning_tree_mode: mstp
    spanning_tree_priority: 0
    structured_config:
      dhcp_relay: "{{ custom_vtep_dhcp_relay }}"
      ip_dhcp_relay: "{{ custom_vtep_ip_dhcp_relay }}"
      ip_extcommunity_lists_regexp: "{{ custom_vtep_ext_community_lists }}"
      route_maps: "{{ custom_vtep_route_maps }}"
      router_bgp: "{{ csc_leaf_peer_tag_spines.router_bgp }}"
  node_groups:
########################################################
# DOMAIN A POD 1 — A-LEAF1/2 (PROD only, VLANs 10, 30)
########################################################
    - group: POD1
      bgp_as: 65101                    # Shared per MLAG pair
      filter:
        tags: ['BLUE', 'ORANGE']       # PROD VLANs 10 (BLUE), 30 (ORANGE)
      structured_config:
        loopback_interfaces: "{{ csc_pod1_leaf_features.loopback_interfaces }}"
        vxlan_interface: "{{ csc_pod1_leaf_features.vxlan_interface }}"
        router_bgp: "{{ csc_pod1_leaf_features.router_bgp }}"
      nodes:
        - name: A-LEAF1
          id: 1
          mgmt_ip: 172.100.101.105/22
          uplink_switch_interfaces: [Ethernet1, Ethernet1, Ethernet1, Ethernet1]
        - name: A-LEAF2
          id: 2
          mgmt_ip: 172.100.101.106/22
          uplink_switch_interfaces: [Ethernet2, Ethernet2, Ethernet2, Ethernet2]
########################################################
# DOMAIN A POD 2 — A-LEAF3/4 (PROD + DEV, VLANs 10, 30, 50)
########################################################
    - group: POD2
      bgp_as: 65103
      filter:
        tags: ['BLUE', 'ORANGE', 'YELLOW']   # PROD VLANs 10, 30 + DEV VLAN 50
      structured_config:
        loopback_interfaces: "{{ csc_pod2_leaf_features.loopback_interfaces }}"
        vxlan_interface: "{{ csc_pod2_leaf_features.vxlan_interface }}"
        router_bgp: "{{ csc_pod2_leaf_features.router_bgp }}"
      nodes:
        - name: A-LEAF3
          id: 3
          mgmt_ip: 172.100.101.107/22
          uplink_switch_interfaces: [Ethernet3, Ethernet3, Ethernet3, Ethernet3]
        - name: A-LEAF4
          id: 4
          mgmt_ip: 172.100.101.108/22
          uplink_switch_interfaces: [Ethernet4, Ethernet4, Ethernet4, Ethernet4]
########################################################
# DOMAIN A POD 3 — A-LEAF5/6 (DEV only, VLANs 50, 70)
########################################################
    - group: POD3
      bgp_as: 65105
      filter:
        tags: ['YELLOW', 'BROWN']      # DEV VLANs 50 (YELLOW), 70 (BROWN)
      structured_config:
        loopback_interfaces: "{{ csc_pod3_leaf_features.loopback_interfaces }}"
        vxlan_interface: "{{ csc_pod3_leaf_features.vxlan_interface }}"
        router_bgp: "{{ csc_pod3_leaf_features.router_bgp }}"
      nodes:
        - name: A-LEAF5
          id: 5
          mgmt_ip: 172.100.101.109/22
          uplink_switch_interfaces: [Ethernet5, Ethernet5, Ethernet5, Ethernet5]
        - name: A-LEAF6
          id: 6
          mgmt_ip: 172.100.101.110/22
          uplink_switch_interfaces: [Ethernet6, Ethernet6, Ethernet6, Ethernet6]
########################################################
# DOMAIN A POD 4 — A-LEAF7/8 (EVPN Gateway pair, All-Active)
#
# VLAN scoping: 10 (multi-domain, PROD), 50 (local DEV, HostA8), 70 (multi-domain, DEV)
# VLAN 30 not present on Gateway pair.
# OISM disabled on Gateway pair (see host_vars/A-LEAF7.yml + A-LEAF8.yml).
########################################################
    - group: POD4
      # Domain A's Gateway pair uses distinct per-Gateway ASNs (not shared
      # like the MLAG pairs). bgp_as is overridden per-node below.
      # Filter: BLUE (VLAN 10, multi-domain), YELLOW (VLAN 50, local, HostA8),
      # BROWN (VLAN 70, multi-domain). ORANGE (VLAN 30) is intentionally excluded —
      # VLAN 30 is scoped to POD1+POD2 only and does not appear on the Gateway pair.
      filter:
        tags: ['BLUE', 'YELLOW', 'BROWN']
      evpn_gateway:
        evpn_l2:
          enabled: true
        evpn_l3:
          enabled: true
        remote_peers:
          - hostname: BB1
            ip_address: 10.0.0.1
            bgp_as: 65000
          - hostname: BB2
            ip_address: 10.0.0.2
            bgp_as: 65000
      structured_config:
        router_bgp: "{{ custom_evpn_gw_bgp_config }}"
        prefix_lists: "{{ custom_evpn_gw_prefix_lists }}"
        route_maps: "{{ custom_evpn_gw_route_maps }}"
      nodes:
        - name: A-LEAF7
          id: 7
          bgp_as: 65107                # Distinct per-Gateway ASN
          mgmt_ip: 172.100.101.111/22
          uplink_switch_interfaces: [Ethernet7, Ethernet7, Ethernet7, Ethernet7]
          structured_config:
            router_bgp: "{{ a_leaf7_dci_bgp_peers.router_bgp }}"
        - name: A-LEAF8
          id: 8
          bgp_as: 65108
          mgmt_ip: 172.100.101.112/22
          uplink_switch_interfaces: [Ethernet8, Ethernet8, Ethernet8, Ethernet8]
          structured_config:
            router_bgp: "{{ a_leaf8_dci_bgp_peers.router_bgp }}"

##########################################################
# DCI Connectivity — A Gateway pair to BB1/BB2 backbone
#
# Point-to-point /31 links, IPv4-numbered per tech-library schema.
# Not part of the underlay routing protocol — the Gateway pair reaches BB1/BB2
# via an eBGP session over these links (see custom_evpn_gw_bgp_config).
##########################################################
l3_edge:
  p2p_links:
    - nodes: [A-LEAF7, BB1]
      interfaces: [Ethernet7, Ethernet1]
      subnet: 172.16.1.0/31
      ip:
        - 172.16.1.1/31
        - 172.16.1.0/31
      include_in_underlay_protocol: false

    - nodes: [A-LEAF7, BB2]
      interfaces: [Ethernet8, Ethernet1]
      subnet: 172.16.1.4/31
      ip:
        - 172.16.1.5/31
        - 172.16.1.4/31
      include_in_underlay_protocol: false

    - nodes: [A-LEAF8, BB1]
      interfaces: [Ethernet7, Ethernet2]
      subnet: 172.16.1.2/31
      ip:
        - 172.16.1.3/31
        - 172.16.1.2/31
      include_in_underlay_protocol: false

    - nodes: [A-LEAF8, BB2]
      interfaces: [Ethernet8, Ethernet2]
      subnet: 172.16.1.6/31
      ip:
        - 172.16.1.7/31
        - 172.16.1.6/31
      include_in_underlay_protocol: false
