---
###################################################
# Domain A — Tenants, VRFs, SVIs, OISM
#
# AVD 6.3 native + targeted CSC for what AVD doesn't emit natively.
###################################################

tenants:
  - name: DOMAIN_A_FABRIC
    mac_vrf_vni_base: 10000
    evpn_l2_multi_domain: false                    # Per-VLAN opt-in below

    vrfs:
      #############################################
      # VRF PROD (L3VNI 50001)
      # OISM underlay group: 232.1.1.1
      # OISM PIM/IGMP source: Loopback101 = 10.101.101.[NodeID]/32
      #############################################
      - name: PROD
        vrf_vni: 50001
        # Class 3/8: `update wait-install` in every VRF BGP context. The
        # MLAG leafs get it from their MLAG iBGP VRF peering machinery; the
        # Gateway pair (mlag: false since the native swap) needs it from the
        # VRF-scoped anchor. Idempotent where both paths write it.
        bgp:
          structured_config:
            # guide has no vrf-level router-id lines
            router_id: null
          structured_config:
            updates:
              wait_install: true
        # NOTE: L3 multi-domain (VRF-level `rd evpn domain all` + multi-domain
        # RTs on IP-VRF Type-5) has no native AVD 6.3 key. Injected via
        # structured_config on the Gateway pair host_vars (A-LEAF7/A-LEAF8).
        evpn_l3_multicast:
          enabled: true
          evpn_underlay_l3_multicast_group: 232.1.1.1
          # NOTE: IPv6 address-family under `evpn multicast` has no native AVD
          # 6.3 key. Injected via structured_config in host_vars if needed.
        mlag_ibgp_peering_vlan: 3001
        mlag_ibgp_peering_ipv4_pool: 192.0.0.0/31
        vtep_diagnostic:
          loopback: 101
          loopback_ip_range: 10.101.101.0/24
        svis:
          - id: 10
            name: Blue
            tags: ['PROD', 'BLUE']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.10.10.1/24
            ipv6_address_virtuals: [2001:db8:10:10::1/64]
            evpn_l2_multi_domain: false            # Multi-domain handled via CSC on Gateway hosts_vars
            # NOTE: paired-redistribute-router-mac has no native AVD 6.3 key.
            # Injected via structured_config below.
          - id: 30
            name: Orange
            tags: ['PROD', 'ORANGE']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.30.30.1/24
            ipv6_address_virtuals: [2001:db8:30:30::1/64]
            evpn_l2_multi_domain: false            # Local to Domain A

      #############################################
      # VRF DEV (L3VNI 50002)
      # OISM underlay group: 232.1.1.2
      # OISM PIM/IGMP source: Loopback102 = 10.102.102.[NodeID]/32
      #############################################
      - name: DEV
        vrf_vni: 50002
        # Class 3/8: `update wait-install` in every VRF BGP context. The
        # MLAG leafs get it from their MLAG iBGP VRF peering machinery; the
        # Gateway pair (mlag: false since the native swap) needs it from the
        # VRF-scoped anchor. Idempotent where both paths write it.
        bgp:
          structured_config:
            # guide has no vrf-level router-id lines
            router_id: null
          structured_config:
            updates:
              wait_install: true
        evpn_l3_multicast:
          enabled: true
          evpn_underlay_l3_multicast_group: 232.1.1.2
        mlag_ibgp_peering_vlan: 3002
        mlag_ibgp_peering_ipv4_pool: 192.0.0.0/31
        vtep_diagnostic:
          loopback: 102
          loopback_ip_range: 10.102.102.0/24
        svis:
          - id: 50
            name: Yellow
            tags: ['DEV', 'YELLOW']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.50.50.1/24
            ipv6_address_virtuals: [2001:db8:50:50::1/64]
            evpn_l2_multi_domain: false
          - id: 70
            name: Brown
            tags: ['DEV', 'BROWN']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.70.70.1/24
            ipv6_address_virtuals: [2001:db8:70:70::1/64]
            evpn_l2_multi_domain: false            # Multi-domain handled via CSC on Gateway hosts_vars

###################################################
# CSC: paired `redistribute router-mac ... next-hop vtep primary` per VLAN
#
# Injected into every standard-leaf's router_bgp.vlans[N].redistribute_routes
# via a group_vars-level custom_structured_configuration override on the
# non-Gateway leaf tier. The Gateway pair (A-LEAF7/A-LEAF8) intentionally
# does NOT carry these lines — anycast reachability into the remote domain
# is handled by the standard Leafs' advertisements + the Gateway's
# `evpn ethernet-segment domain local|remote` machinery.
#
# VERIFY: this list is per-VLAN and needs the CSC to be applied on the
# LEAF nodes, not fabric-wide. Consider host_vars or l3leaf.node_group
# structured_config for pinpoint application.
###################################################

# The two extra redistribute lines are injected via the l3leaf.defaults or
# per-node_group structured_config in DOMAIN_A_FABRIC.yml.
