          - router-mac virtual-ip next-hop vtep primary

###################################################
# DOMAIN B SPINES
###################################################

spine:
  defaults:
    isis_system_id_prefix: '0000.0000'
    platform: cEOS-LAB
    bgp_as: 65200
    loopback_ipv4_pool: 10.0.2.0/24
    structured_config:
      vlan_internal_order: null
      # Guide dialect: isis circuit-type level-2 on loopbacks too.
      loopback_interfaces:
        - name: Loopback0
          eos_cli: isis circuit-type level-2
      router_multicast: "{{ csc_spine_multicast }}"
      router_bgp: "{{ csc_spine_rr.router_bgp }}"
      # Class 20 — see the isis_maximum_paths note above.
      router_isis:
        address_family_ipv4:
          maximum_paths: null
      # PARITY-LEDGER class 2 (+15, +circuit-type): the guide's Domain B
      # underlay is IPv4-unnumbered with default IS-IS metric and explicit
      # circuit-type. No native 6.3.0 key exists (underlay_ipv4_unnumbered
      # was a phantom — set since the initial build, absent from the
      # schema, silently ignored). CSC merges onto the generated
      # interfaces BY NAME: ip_address replaced, isis_metric nulled
      # (CSC-null pattern), circuit-type made explicit.
      ethernet_interfaces:
        - name: Ethernet1
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet2
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet3
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet4
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet5
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet6
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet7
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
        - name: Ethernet8
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
          # Class 4b: the guide runs PIM on ALL 8 spine transit
          # interfaces (incl. Et7/8 toward the multicast-disabled
          # Gateway pair) with the unnumbered local-interface form.
          # local-interface is NOT in cli_config_gen's ethernet pim
          # schema (vlan-only key) — eos_cli carries that one line.
          # Sweep: the guide's spine transit blocks carry explicit
          # `no switchport`; these CSC-created entries render only what
          # they set.
          switchport:
            enabled: false
          pim:
            ipv4:
              sparse_mode: true
          eos_cli: |
            pim ipv4 local-interface Loopback0
  nodes:
    - name: B-SPINE1
      id: 201
      mgmt_ip: 172.100.102.101/22
    - name: B-SPINE2
      id: 202
      mgmt_ip: 172.100.102.102/22
    - name: B-SPINE3
      id: 203
      mgmt_ip: 172.100.102.103/22
    - name: B-SPINE4
      id: 204
      mgmt_ip: 172.100.102.104/22

##################################################
# DOMAIN B LEAFS — EVPN All-Active everywhere
##################################################

l3leaf:
  defaults:
    isis_system_id_prefix: '0000.0000'
    platform: cEOS-LAB
    bgp_as: 65200                                  # Shared ASN — single-ASN iBGP fabric
    loopback_ipv4_pool: 10.0.2.0/24
    vtep_loopback: Loopback1                       # explicit VTEP source loopback
    vtep_loopback_ipv4_pool: 10.1.2.0/24
    # Uplink pool feeds eos_designs' numbered p2p generation; the CSC in
    # structured_config below overrides every uplink to `ip address
    # unnumbered Loopback0`, so these numbers never reach a render.
    uplink_ipv4_pool: 172.31.255.0/24
    uplink_interfaces: [Ethernet1, Ethernet2, Ethernet3, Ethernet4]
    uplink_switches: [B-SPINE1, B-SPINE2, B-SPINE3, B-SPINE4]
    virtual_router_mac_address: 00:1c:73:00:00:01
    spanning_tree_mode: mstp
    structured_config:
      # Guide dialect: isis circuit-type level-2 on loopbacks too.
      loopback_interfaces:
        - name: Loopback0
          eos_cli: isis circuit-type level-2
        - name: Loopback1
          eos_cli: isis circuit-type level-2
      dhcp_relay: "{{ custom_vtep_dhcp_relay }}"
      # Class 20 — see the isis_maximum_paths note above.
      router_isis:
        address_family_ipv4:
          maximum_paths: null
      spanning_tree: "{{ custom_vtep_stp_root_super.spanning_tree }}"
      router_bgp: "{{ custom_vtep_bgp_session_tracker.router_bgp }}"
      # Class 2 batch — see the spine block note above.
      ethernet_interfaces:
        - name: Ethernet1
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
        - name: Ethernet2
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
        - name: Ethernet3
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2
        - name: Ethernet4
          ip_address: unnumbered Loopback0
          isis_metric: null
          isis_circuit_type: level-2

  ##############################################
  # Per-pod grouping for VLAN filtering + Domain B redistribute-router-mac CSC
  # (all pods are `mlag: false` — Domain B uses EVPN A/A throughout)
  ##############################################
  node_groups:
    ##############################################
    # B_POD1 (B-LEAF1/B-LEAF2): VLANs 20 (HostB1), 40 (HostB2). PROD only.
    ##############################################
    - group: B_POD1
      mlag: false
      filter:
        tags: ['GREEN', 'PURPLE']
      structured_config:
        # full router-multicast block now rides the host eos_cli verbatim
        router_multicast: null
        # guide has no source-nat lines anywhere
        virtual_source_nat_vrfs: null
        # Guide B pod leafs define no route-maps or ECLs at all —
        # the generated SOO set is the only occupant; null wholesale.
        route_maps: null
        ip_extcommunity_lists: null
        # Sweep S2: null the emitted `switchport mode access` per guide dialect.
        # B3/4 Po7 deferred (rend-only, dies in the endpoints refresh).
        port_channel_interfaces:
          - name: Port-Channel7
            switchport:
              mode: null
          - name: Port-Channel8
            switchport:
              mode: null
        # Sweep S1: member-port `no switchport` per guide; B3/4 Eth7 deferred to the
        # endpoints refresh (single-vs-dual-homing gap).
        ethernet_interfaces:
          - name: Ethernet7
            switchport:
              enabled: false
          - name: Ethernet8
            switchport:
              enabled: false
        vlan_interfaces:
          - name: Vlan20
            ipv6_enable: null
            eos_cli: mld
          - name: Vlan40
            ipv6_enable: null
            eos_cli: mld
        vxlan_interface:
          vxlan1:
            vxlan:
              vlans: null
            eos_cli: |
              vxlan vlan 20,40 vni 10020,10040
              vxlan vrf PROD multicast group overlay 239.0.20.101 encap 232.1.1.20 immediate
              vxlan multicast ipv6
        router_bgp: "{{ csc_b_pod1_leaf_features.router_bgp }}"
      nodes:
        - name: B-LEAF1
          id: 1
          mgmt_ip: 172.100.102.105/22
          uplink_switch_interfaces: [Ethernet1, Ethernet1, Ethernet1, Ethernet1]
        - name: B-LEAF2
          id: 2
          mgmt_ip: 172.100.102.106/22
          uplink_switch_interfaces: [Ethernet2, Ethernet2, Ethernet2, Ethernet2]

    ##############################################
    # B_POD2 (B-LEAF3/B-LEAF4): VLANs 10 (HostB4, shared w/ Domain A), 40. PROD only.
    ##############################################
    - group: B_POD2
      mlag: false
      # Endpoints refresh: per-node filters — B3 carries RED (VLAN 60,
      # DEV) and B4 carries BROWN (VLAN 70, DEV) per guide; PURPLE
      # leaves the pod (HostB4 is BLUE). Node filter replaces group
      # filter, so each node lists its full set.
      structured_config:
        # full router-multicast block now rides the host eos_cli verbatim
        router_multicast: null
        # guide has no source-nat lines anywhere
        virtual_source_nat_vrfs: null
        # Guide B pod leafs define no route-maps or ECLs at all —
        # the generated SOO set is the only occupant; null wholesale.
        route_maps: null
        ip_extcommunity_lists: null
        # Sweep S2: null the emitted `switchport mode access` per guide dialect.
        # B3/4 Po7 deferred (rend-only, dies in the endpoints refresh).
        port_channel_interfaces:
          # S2 family: guide ports carry no explicit mode line
          - name: Port-Channel7
            switchport:
              mode: null
          - name: Port-Channel8
            switchport:
              mode: null
        # Sweep S1: member-port `no switchport` per guide; B3/4 Eth7 deferred to the
        # endpoints refresh (single-vs-dual-homing gap).
        ethernet_interfaces:
          - name: Ethernet8
            switchport:
              enabled: false
        vlan_interfaces:
          # (Vlan40 left with PURPLE in the endpoints refresh; its entry
          # here would create-trap a bare SVI.)
          - name: Vlan10
            ipv6_enable: null
            eos_cli: mld
        vxlan_interface:
          vxlan1:
            vxlan:
              vlans: null
            eos_cli: |
              vxlan vrf PROD multicast group overlay 239.0.20.101 encap 232.1.1.20 immediate
              vxlan multicast ipv6
        router_bgp: "{{ csc_b_pod2_leaf_features.router_bgp }}"
      nodes:
        - name: B-LEAF3
          filter:
            tags: ['BLUE', 'RED']
          # DEV SVI mld (node-scoped — pod scope would trap Vlan60
          # onto the sibling).
          structured_config:
            # node eos_cli is a scalar and replaces the group string —
            # the pod mcast lines ride here too.
            vxlan_interface:
              vxlan1:
                eos_cli: |
                  vxlan vlan 10,60 vni 10010,10060
                  vxlan vrf PROD multicast group overlay 239.0.20.101 encap 232.1.1.20 immediate
                  vxlan multicast ipv6
            vlan_interfaces:
              - name: Vlan60
                ipv6_enable: null
                eos_cli: mld
          id: 3
          mgmt_ip: 172.100.102.107/22
          uplink_switch_interfaces: [Ethernet3, Ethernet3, Ethernet3, Ethernet3]
        - name: B-LEAF4
          filter:
            tags: ['BLUE', 'BROWN']
          # DEV SVI mld (node-scoped — pod scope would trap Vlan70
          # onto the sibling).
          structured_config:
            # node eos_cli is a scalar and replaces the group string —
            # the pod mcast lines ride here too.
            vxlan_interface:
              vxlan1:
                eos_cli: |
                  vxlan vlan 10,70 vni 10010,10070
                  vxlan vrf PROD multicast group overlay 239.0.20.101 encap 232.1.1.20 immediate
                  vxlan multicast ipv6
            vlan_interfaces:
              - name: Vlan70
                ipv6_enable: null
                eos_cli: mld
          id: 4
          mgmt_ip: 172.100.102.108/22
          uplink_switch_interfaces: [Ethernet4, Ethernet4, Ethernet4, Ethernet4]

    ##############################################
    # B_POD3 (B-LEAF5/B-LEAF6): VLANs 40, 80 (uplink to B-SW1). PROD + DEV.
    ##############################################
    - group: B_POD3
      mlag: false
      filter:
        tags: ['PURPLE', 'BLACK']
      structured_config:
        # full router-multicast block now rides the host eos_cli verbatim
        router_multicast: null
        # guide has no source-nat lines anywhere
        virtual_source_nat_vrfs: null
        # Guide B pod leafs define no route-maps or ECLs at all —
        # the generated SOO set is the only occupant; null wholesale.
        route_maps: null
        ip_extcommunity_lists: null
        # ES/LACP style on the B-SW1 uplink Po (l2leaf parent side) —
        # same guide dialect as the endpoint profiles; pod-scoped since
        # the l2leaf uplink Po is generated, not adapter-driven.
        port_channel_interfaces:
          - name: Port-Channel7
            lacp_id: c0d6.8200.0506
            bgp:
              session_tracker: TRACK-LOCAL-EVPN-PEERS
            evpn_ethernet_segment:
              identifier: auto lacp
              route_target: null
        # Sweep S1: member-port `no switchport` per guide; B3/4 Eth7 deferred to the
        # endpoints refresh (single-vs-dual-homing gap).
        ethernet_interfaces:
          - name: Ethernet7
            switchport:
              enabled: false
        vlan_interfaces:
          - name: Vlan40
            ipv6_enable: null
            eos_cli: mld
          - name: Vlan80
            ipv6_enable: null
            eos_cli: mld
        vxlan_interface:
          vxlan1:
            vxlan:
              vlans: null
            eos_cli: |
              vxlan vlan 40,80 vni 10040,10080
              vxlan vrf PROD multicast group overlay 239.0.20.101 encap 232.1.1.20 immediate
              vxlan multicast ipv6
        router_bgp: "{{ csc_b_pod3_leaf_features.router_bgp }}"
      nodes:
        - name: B-LEAF5
          id: 5
          mgmt_ip: 172.100.102.109/22
          uplink_switch_interfaces: [Ethernet5, Ethernet5, Ethernet5, Ethernet5]
        - name: B-LEAF6
          id: 6
          mgmt_ip: 172.100.102.110/22
          uplink_switch_interfaces: [Ethernet6, Ethernet6, Ethernet6, Ethernet6]

    ##############################################
    # B_GATEWAY (B-LEAF7/B-LEAF8) — A/A EVPN Gateway. OISM disabled per host_vars.
    # NO redistribute-router-mac CSC (Gateway relies on Interconnect-ESI machinery).
    ##############################################
    - group: B_GATEWAY
      mlag: false
      evpn_gateway:
        all_active_multihoming:
          enabled: true
          evpn_ethernet_segment:
            identifier: '0000:bbbb:0007:0008:0000'
            rt_import: '00:bb:bb:07:08:00'
        d_path:
          local_domain_id: '2:2'
          remote_domain_id: '99:99'
        evpn_l2:
          enabled: true
        evpn_l3:
          enabled: true
          mode: rd-rt-rewrite
        remote_peers:
          - hostname: BB1
            ip_address: 10.0.0.1
            bgp_as: 65000
          - hostname: BB2
            ip_address: 10.0.0.2
            bgp_as: 65000
      filter:
        tags: ['BLUE', 'BROWN']              # VLANs 10, 70 — guide gateways carry no VLAN 60
      structured_config:
        ethernet_interfaces:
          # guide puts explicit no-switchport on the Po9 member
          - name: Ethernet9
            switchport:
              enabled: false
        vxlan_interface:
          vxlan1:
            vxlan:
              vlans: null
            eos_cli: |
              vxlan vlan 10,70 vni 10010,10070
        # guide has no source-nat lines anywhere
        virtual_source_nat_vrfs: null
        vlan_interfaces:
          - name: Vlan10
            # guide SVIs carry ipv6 virtual without ipv6 enable
            ipv6_enable: null
          - name: Vlan70
            # guide SVIs carry ipv6 virtual without ipv6 enable
            ipv6_enable: null
        ip_extcommunity_lists: null
        # Sweep S2: null the emitted `switchport mode access` per guide dialect.
        # B3/4 Po7 deferred (rend-only, dies in the endpoints refresh).
        port_channel_interfaces:
          - name: Port-Channel9
            switchport:
              mode: null
        router_bgp: "{{ custom_evpn_gw_bgp_config }}"
        prefix_lists: "{{ custom_evpn_gw_prefix_lists }}"
        route_maps: "{{ custom_evpn_gw_route_maps }}"
      nodes:
        - name: B-LEAF7
          id: 7
          mgmt_ip: 172.100.102.111/22
          uplink_switch_interfaces: [Ethernet7, Ethernet7, Ethernet7, Ethernet7]
          structured_config:
            router_bgp: "{{ b_leaf7_dci_bgp_peers.router_bgp }}"
        - name: B-LEAF8
          id: 8
          mgmt_ip: 172.100.102.112/22
          uplink_switch_interfaces: [Ethernet8, Ethernet8, Ethernet8, Ethernet8]
          structured_config:
            router_bgp: "{{ b_leaf8_dci_bgp_peers.router_bgp }}"

##################################################
# DOMAIN B L2 SWITCHES — B-SW1 (CE switch)
##################################################

l2leaf:
  defaults:
    platform: cEOS-LAB
    spanning_tree_mode: mstp
    structured_config:
      # Guide B-SW1 lacks the routed-default trio and mst block; carries
      # the global bpduguard default.
      mac_address_table: null
      spanning_tree:
        edge_port:
          bpduguard_default: true
        mst_instances: null
    uplink_switches: [B-LEAF5, B-LEAF6]
    uplink_interfaces: [Ethernet1, Ethernet2]         # B-SW1's own Et1/Et2 face the LEAFs
    uplink_type: port-channel                          # Single LACP trunk to both VTEPs
  nodes:
    - name: B-SW1
      filter:
        tags: ['PURPLE', 'BLACK']   # VLANs 40, 80 — sources the defs + uplink trunks
      structured_config:
        ip_routing: false   # guide SW1 carries explicit no ip routing
        ethernet_interfaces:
          # guide access ports carry no explicit mode line
          - name: Ethernet3
            switchport:
              mode: null
          - name: Ethernet4
            switchport:
              mode: null
      id: 100
      mgmt_ip: 172.100.102.113/22
      uplink_switch_interfaces: [Ethernet7, Ethernet7]  # onto B-LEAF5 Et7 + B-LEAF6 Et7

##########################################################
# DCI Connectivity — B Gateway pair to BB1/BB2 backbone
##########################################################

l3_edge:
  p2p_links:
    - nodes: [B-LEAF7, BB1]
      interfaces: [Ethernet7, Ethernet3]
      subnet: 172.16.2.0/31
      ip:
        - 172.16.2.1/31
        - 172.16.2.0/31
      include_in_underlay_protocol: false

    - nodes: [B-LEAF7, BB2]
      interfaces: [Ethernet8, Ethernet3]
      subnet: 172.16.2.4/31
      ip:
        - 172.16.2.5/31
        - 172.16.2.4/31
      include_in_underlay_protocol: false

    - nodes: [B-LEAF8, BB1]
      interfaces: [Ethernet7, Ethernet4]
      subnet: 172.16.2.2/31
      ip:
        - 172.16.2.3/31
        - 172.16.2.2/31
      include_in_underlay_protocol: false

    - nodes: [B-LEAF8, BB2]
      interfaces: [Ethernet8, Ethernet4]
      subnet: 172.16.2.6/31
      ip:
        - 172.16.2.7/31
        - 172.16.2.6/31
      include_in_underlay_protocol: false
