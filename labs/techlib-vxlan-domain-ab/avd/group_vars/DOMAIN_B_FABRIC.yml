---
###################################################
# Domain B — Fabric shape
#
# IS-IS Level-2 underlay (IPv4 unnumbered on transit interfaces)
# Single-ASN iBGP EVPN overlay in AS 65200, RR on Spines
# EVPN All-Active multihoming on all standard leafs AND Gateway pair
# STP super-root on all VTEPs
# IPv4 fabric addressing, dual-stack overlay IRB
#
# Rendered configs must match:
#   docs/data_center/evpnvxlan/deployment_guide/domains_a_b/full_configs/B-*.cfg
# in the aristanetworks/tech-library repo.
###################################################

fabric_name: DOMAIN_B_FABRIC

# Class 3 enabler — same custom cEOS-LAB platform entry as Domain A
# (see DOMAIN_A_FABRIC.yml for the full hyphen-matcher landmine note).
custom_platform_settings:
  - platforms: ['cEOS-LAB']
    feature_support:
      queue_monitor_length_notify: false
      evpn_gateway_all_active_multihoming: true
      evpn_gateway_rd_rt_rewrite: true

# Suppress the AVD-default `transceiver qsfp default-mode 4x10G` line on
# spines/leafs. Tech-library doesn't render this on Domain B nodes.
custom_structured_configuration_transceiver_qsfp_default_mode_4x10: null

###################################################
# Underlay: IS-IS Level 2 only, IPv4 unnumbered
###################################################

underlay_routing_protocol: isis
# Guide has no SOO re-advertisement protection machinery. NOTE: this flag
# does NOT gate the generated SOO set (that path is hard-coded on
# ibgp+vtep+client); retained only to document intent. The actual kills
# ride the pod/gateway structured channels + the af-evpn anchor nulls.
evpn_prevent_readvertise_to_server: false
# The SOO route-map attaches are written by the overlay generator itself
# (ibgp+vtep+client gate, no input knob) and out-rank every ordinary
# channel; only the CSC prefix — which merges last — can null them.
# Guide sysids are node-id based (0000.0000.000N), not loopback-derived.
isis_system_id_format: node_id
isis_area_id: '49.1111'                            # NET: 49.1111.0000.0000.[NodeID].00
underlay_isis_instance_name: "100"                 # The guide names its IS-IS instance `100` (PARITY-LEDGER class 1)
isis_ti_lfa:
  enabled: false                                   # Not required for the base design (add if needed)
isis_default_is_type: level-2
# Class 20: the guide's B nodes render an EMPTY `address-family ipv4
# unicast` under router isis — no maximum-paths line. The schema default
# for isis_maximum_paths is 4 (emitted even when the var is absent), so
# the CSC-null in each node-type's structured_config below un-sets it.

###################################################
# Overlay: iBGP EVPN AS 65200, RR on Spines
###################################################

overlay_routing_protocol: ibgp

bgp_distance:
  external_routes: 20
  internal_routes: 200
  local_routes: 200

bgp_peer_groups:
  # PARITY-LEDGER class 8 — see DOMAIN_A_FABRIC.yml for the dialect note.
  # CSC-null via the role's structured_config (merges under
  # router_bgp.peer_groups[name=LOCAL-EVPN-PEERS] only where the group
  # materializes).
  evpn_overlay_peers:
    name: LOCAL-EVPN-PEERS
    bfd: true
    structured_config:
      send_community: null
      maximum_routes: null
      # Guide has no SOO machinery on the local overlay.
      route_map_in: null
      route_map_out: null
  evpn_overlay_core:
    name: REMOTE-EVPN-PEERS
    bfd: true
    structured_config:
      # Class 8 dialect (see DOMAIN_A_FABRIC.yml core-group note).
      send_community: null
      maximum_routes: null
      ebgp_multihop: null

evpn_ebgp_multihop: 3

# PARITY-LEDGER class 8 — `neighbor default send-community` on every BGP
# speaker (bare form renders when the value is exactly "all"). Safe at
# fabric-group scope: B-SW1 (l2leaf) never defines router_bgp.as, so the
# router-bgp template renders nothing for it.
custom_structured_configuration_router_bgp:
  neighbor_default:
    send_community: all

bgp_update_wait_install: true
evpn_import_pruning: true
evpn_multicast: true

router_id_loopback_description: "Globally Unique Address"
vtep_loopback_description: "VTEP IP"                # Per tech-library B-LEAF1.cfg
default_vrf_diag_loopback_description: "OISM PIM/IGMP Source"

# BGP peer description template — match tech-library `B-LEAF1.EVPN` style.
overlay_bgp_peer_description: "{peer}.EVPN"

underlay_multicast_pim_sm: true

###################################################
# Custom Structured Config — VTEP-side (Domain B has no MLAG)
#
# CSC: tunnel-only DHCP relay suppression (no MLAG peer-link to suppress).
# CSC: spanning-tree root super — advertise a shared bridge ID of
# 0000.0000.0001 with priority 0 via BPDUs so downstream CE switches
# (B-SW1) see a single root across the EVPN A/A pair.
###################################################

custom_vtep_dhcp_relay:
  tunnel_requests_disabled: true

custom_vtep_stp_root_super:
  spanning_tree:
    # Guide dialect: global edge-port bpduguard default; no mst block.
    edge_port:
      bpduguard_default: true
    mst_instances: null
    root_super: true

custom_vtep_bgp_session_tracker:
  router_bgp:
    peer_groups:
      - name: LOCAL-EVPN-PEERS
        session_tracker: TRACK-LOCAL-EVPN-PEERS
    address_family_evpn:
      # VERIFY: `layer_2_fec_in_place_update` schema key for AVD 6.3.0.
      # Target render: `layer-2 fec in-place update` under address-family evpn.
      layer_2_fec_in_place_update:
        enabled: true
    session_trackers:
      - name: TRACK-LOCAL-EVPN-PEERS
        # Guide dialect: fast recovery (AVD default is 300s).
        recovery_delay: 10
        recovery_delay: 300

###################################################
# Custom Structured Config — Gateway-side (B-LEAF7/B-LEAF8)
#
# CSC: WAN-facing IPv4 eBGP session to BB1/BB2 (same shape as Domain A's
# custom_evpn_gw_bgp_config, tuned for Domain B's AS 65200 + local-as 65000
# trick + Domain B's local-domain identifier 2:2).
###################################################

custom_evpn_gw_bgp_config:
  vlans:
    # guide gateway MAC-VRFs keep only the domain-all rd/rt variants
    - id: 10
      rd: null
      route_targets:
        both: null
    - id: 70
      rd: null
      route_targets:
        both: null
  neighbors:
    # remote-as rides the peer group in the guide, not the neighbor
    - ip_address: 10.0.0.1
      remote_as: null
    - ip_address: 10.0.0.2
      remote_as: null
  vrfs:
    # guide has no vrf-level router-id lines
    - name: PROD
      router_id: null
    - name: DEV
      router_id: null
  address_family_evpn:
    peer_groups:
      - name: LOCAL-EVPN-PEERS
        route_map_in: null
        route_map_out: null
  address_family_ipv4:
    peer_groups:
      - name: REMOTE-IPV4-PEERS
        activate: true
      - name: REMOTE-EVPN-PEERS
        # guide leaves the EVPN group implicitly inactive in the ipv4 AF
        activate: null
      # Class 8: the Gateway keeps its ipv4 AF (REMOTE-IPV4-PEERS activate
      # above) but not the explicit LOCAL-EVPN deactivate — implicit via
      # `no bgp default ipv4-unicast`, same dialect as the rest of the fabric.
      - name: LOCAL-EVPN-PEERS
        activate: null
  # Class 3: domain identifiers + bestpath d-path now native (B_GATEWAY's
  # d_path/all_active_multihoming); the REMOTE-IPV4-PEERS password and
  # send-community died with the swap (guide carries neither).
  peer_groups:
    - name: REMOTE-IPV4-PEERS
      remote_as: 65000
      route_map_out: RM-AS65000-IPV4-OUT
    - name: REMOTE-EVPN-PEERS
      local_as: 65000
      remote_as: 65000
    - name: LOCAL-EVPN-PEERS
      # Guide gateways do NOT reflect for the local overlay — the Spine RRs
      # already reflect client-to-client, which covers the pair's I-ESI
      # Type-1/Type-4 exchange. (Earlier belt-and-suspenders rr-client here
      # was a render-only extra vs the guide.)
      route_reflector_client: null

custom_evpn_gw_prefix_lists:
  - name: PL-GATEWAY-LOOP
    sequence_numbers:
      - sequence: 10
        action: permit 10.0.2.7/32
      - sequence: 20
        action: permit 10.0.2.8/32
      - sequence: 30
        action: permit 10.1.2.7/32
      - sequence: 40
        action: permit 10.1.2.8/32

custom_evpn_gw_route_maps:
  - name: RM-AS65000-IPV4-OUT
    sequence_numbers:
      - sequence: 10
        type: permit
        match:
          - ip address prefix-list PL-GATEWAY-LOOP
  # Suppress the generated SOO maps (empirical: entries merged with null
  # sequence_numbers should render nothing).
  - name: RM-EVPN-SOO-IN
    sequence_numbers: null
  - name: RM-EVPN-SOO-OUT
    sequence_numbers: null

b_leaf7_dci_bgp_peers:
  router_bgp:
    address_family_ipv4:
      # guide gateways advertise the domain aggregates + own /32s
      networks:
        - prefix: 10.0.2.0/24
        - prefix: 10.1.2.0/24
        - prefix: 10.0.2.7/32
        - prefix: 10.1.2.7/32
    # Tracker recovery dialect (guide: 10s; AVD auto-creates referenced
    # trackers with default 300 AFTER the defaults channel merges — the
    # node-group channel is the one that wins).
    session_trackers:
      - name: TRACK-LOCAL-EVPN-PEERS
        recovery_delay: 10
    neighbors:
      - ip_address: 172.16.2.0
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.2.4
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4

b_leaf8_dci_bgp_peers:
  router_bgp:
    address_family_ipv4:
      # guide gateways advertise the domain aggregates + own /32s
      networks:
        - prefix: 10.0.2.0/24
        - prefix: 10.1.2.0/24
        - prefix: 10.0.2.8/32
        - prefix: 10.1.2.8/32
    neighbors:
      - ip_address: 172.16.2.2
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.2.6
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4

###################################################
# Custom Structured Config — Spine RR
#
# Domain B's Spines are RRs for iBGP EVPN. cluster-id shared across all
# four Spines so RR-reflected routes deduplicate cleanly on the Leaf side.
###################################################

csc_spine_rr:
  router_bgp:
    bgp_cluster_id: 10.0.2.205
    peer_groups:
      - name: LOCAL-EVPN-PEERS
        route_reflector_client: true
    # Class 8: the guide's B nodes carry NO router-bgp-level ipv4 AF
    # (the deactivate is implicit via `no bgp default ipv4-unicast`).
    # CSC-null removes the block eos_designs emits for the deactivate.
    address_family_ipv4: null
    # Class 20: the guide's B spines (pure RRs, no ECMP role in the
    # underlay — that's IS-IS's job) carry no maximum-paths line.
    maximum_paths: null

csc_spine_multicast:
  ipv4:
    routing: true

###################################################
# Custom Structured Config — Paired redistribute-router-mac per Domain B POD
#
# CSC: EOS 4.34.0F anycast gateway advertisement (paired next-hop-vtep-primary
# variants). Not natively exposed by AVD 6.3. Injected per standard-leaf POD.
# The Gateway pair (B_GATEWAY) intentionally does NOT carry these lines.
###################################################

# B_POD1 (B-LEAF1/2): VLANs 20, 40
csc_b_pod1_leaf_features:
  router_bgp:
    address_family_evpn:
      peer_groups:
        # The generator writes the SOO route-map attaches onto the af-evpn
        # peer-group item unconditionally (ibgp+vtep+client); this channel
        # merges by name after generation and null-removes them.
        - name: LOCAL-EVPN-PEERS
          route_map_in: null
          route_map_out: null
    # OISM evpn-multicast sub-AF dialect: no native cli path for the
    # bare address-family ipv4/ipv6 blocks (only ipv4.transit exists),
    # so the three-line construct rides vrf eos_cli with the native
    # header nulled — net-zero headers, both AFs gained.
    vrfs:
      - name: PROD
        router_id: null
        evpn_multicast: null
        eos_cli: |
          evpn multicast
             address-family ipv4
             !
             address-family ipv6
    # Tracker recovery dialect (guide: 10s; AVD auto-creates referenced
    # trackers with default 300 AFTER the defaults channel merges — the
    # node-group channel is the one that wins).
    session_trackers:
      - name: TRACK-LOCAL-EVPN-PEERS
        recovery_delay: 10
    # Class 8: no router-bgp-level ipv4 AF on B standard leafs (see csc_spine_rr note).
    address_family_ipv4: null
    vlans:
      - id: 20
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary
      - id: 40
        redistribute_routes:
          - learned
          - router-mac next-hop vtep primary
          - router-mac virtual-ip next-hop vtep primary

# B_POD2 (B-LEAF3/4): VLANs 10, 40
csc_b_pod2_leaf_features:
