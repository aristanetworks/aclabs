---
# BB nodes opt out of the fleet routed-switchport CSC + arp aging input.
custom_structured_configuration_switchport_default: null
# The arp writer runs after every structured channel and re-applies the
# schema default; only the CSC overlay (applied last) can null the leaf.
custom_structured_configuration_arp:
  aging:
    timeout_default: null
###################################################
# Backbone (BB1, BB2) — dedicated fabric for the DCI
#
# BB1 and BB2 provide two things to the Domain A + Domain B Gateway pairs:
#   1. IPv4 transport (the /31 point-to-point links between each Gateway
#      and each backbone node, addressed from 172.16.1.0/24 for Domain A
#      and 172.16.2.0/24 for Domain B).
#   2. EVPN Route Reflection in AS 65000 — every Gateway (A-LEAF7/8 in
#      AS 65107/65108, B-LEAF7/8 in AS 65200) peers with BB1 + BB2 as
#      iBGP RR clients (via `neighbor ... local-as 65000 no-prepend
#      replace-as` on the Gateway side).
#
# BB1/BB2 are NOT part of either domain's fabric — they have no local
# tenant SVIs, no VXLAN, and no OISM. The `backbone_router` node_type_keys
# entry below expresses this shape cleanly.
###################################################

fabric_name: BACKBONE

# Backbone p2p links use MTU 9214 (larger than leaf-facing 9114 to
# accommodate the fabric MTU headers on transit).
p2p_uplinks_mtu: 9214

# Global default MTU on backbone (tech-library BB1/BB2 have this so all
# interfaces default to 9214 without needing per-interface overrides).
custom_structured_configuration_interface_defaults:
  mtu: 9214

###################################################
# Custom node_type_keys — backbone_router
#
# CSC: AVD 6.3.0 ships spine, l3leaf, l2leaf, super-spine, wan_router, etc.
# but no `backbone_router` type. This custom key expresses "a routing
# node that acts purely as an EVPN Route Reflector + IPv4 transit for
# other domains' Gateway pairs":
#   - No connected endpoints (no tenant hosts)
#   - No underlay routing protocol at the fabric level (peerings come
#     via l3_edge.p2p_links from the Gateway pairs)
#   - EVPN address-family only (RR role, next-hop-unchanged, cluster-id)
#   - Interface descriptions follow the same {{ peer }} pattern as spines
#
# VERIFY: node_type_keys schema in AVD 6.3.0. The key names below are
# best-guess; may need to align with 6.3's exact schema.
###################################################

node_type_keys:
  - key: backbone_router
    type: backbone_router
    connected_endpoints: false
    default_evpn_role: server                # RR (EVPN server) role
    default_overlay_address_families: [evpn]
    default_underlay_routing_protocol: none  # No fabric-wide IGP/BGP; underlay comes from l3_edge
    default_mpls_overlay_role: none
    # BGP router-id auto-derives from Loopback0 (10.0.0.[NodeID]) via
    # backbone_router.defaults.loopback_ipv4_pool below.

###################################################
# BGP knobs — iBGP AS 65000, RR to all four Gateway nodes
###################################################

bgp_distance:
  external_routes: 20
  internal_routes: 200
  local_routes: 200

# NOTE: no bgp_peer_groups here — the backbone_router custom node type
# (default_underlay_routing_protocol: none) generates no eos_designs peer
# groups; the RR peer groups are defined wholesale in csc_backbone_rr_bgp
# below. A previous bgp_peer_groups block (with passwords) was inert input
# and was removed with the listen-range rewrite.

# PARITY-LEDGER class 8/20: the guide's BB1/BB2 do NOT carry
# `update wait-install` (RRs converge on control-plane only; FIB install
# gating is a VTEP concern). MUST be explicit false — the AVD 6.3.0
# schema default is TRUE, so omission still renders the line.
bgp_update_wait_install: false
evpn_import_pruning: true

router_id_loopback_description: "Globally Unique Address"

###################################################
# Custom Structured Config — RR-side EVPN peerings + IPv4 transit
#
# CSC: the RR-client behavior (cluster-id, next-hop-unchanged, per-client
# `neighbor <ip> route-reflector-client`) plus the WAN-facing IPv4 unicast
# neighbors for all four Gateway loopbacks. Both BB1 and BB2 use cluster-id
# 10.0.0.100 so RR-reflected routes deduplicate cleanly at the Gateway pairs.
###################################################

csc_backbone_rr_bgp:
  # The guide's backbone RR model (BB1 startup-config, verified line-set):
  # DYNAMIC peering only — `bgp listen range` covers the Gateway loopbacks
  # (10.0.0.0/8 + the 1.1.0.0/16 router-id space) into EVPN-GW-PEERS
  # (iBGP AS 65000 via the Gateways' local-as trick) and the 172.16.0.0/16
  # p2p transit space into IP-TRANSPORT-CLIENTS gated by the DC-ASN-RANGE
  # peer filter (accepts AS 65100-65499). No static neighbors, no
  # per-Gateway state on the RRs. cluster-id 1.1.0.0 shared by both BBs;
  # router-id 1.1.0.[node] is set per node (deliberately NOT Loopback0).
  # No `bgp bestpath d-path` here — D-PATH evaluation is the Gateways'
  # job; the RRs reflect with next-hop-unchanged.
  router_bgp:
    bgp_cluster_id: 1.1.0.0
    graceful_restart:
      enabled: true
      restart_time: 300
    listen_ranges:
      - prefix: 1.1.0.0/16
        peer_group: EVPN-GW-PEERS
        remote_as: 65000
      - prefix: 10.0.0.0/8
        peer_group: EVPN-GW-PEERS
        remote_as: 65000
      - prefix: 172.16.0.0/16
        peer_group: IP-TRANSPORT-CLIENTS
        peer_filter: DC-ASN-RANGE
    neighbor_default:
      send_community: all
    peer_groups:
      - name: EVPN-GW-PEERS
        next_hop_unchanged: true
        update_source: Loopback0
        bfd: true
        route_reflector_client: true
      - name: IP-TRANSPORT-CLIENTS
        route_reflector_client: true
    address_family_evpn:
      peer_groups:
        - name: EVPN-GW-PEERS
          activate: true
    address_family_ipv4:
      peer_groups:
        - name: IP-TRANSPORT-CLIENTS
          activate: true

# The AS-range gate for dynamic IPv4 transit clients (referenced by the
# 172.16.0.0/16 listen range above).
custom_structured_configuration_peer_filters:
  - name: DC-ASN-RANGE
    sequence_numbers:
      - sequence: 10
        match: as-range 65100-65499 result accept

###################################################
# backbone_router node definitions
###################################################

backbone_router:
  defaults:
    platform: cEOS-LAB
    bgp_as: 65000
    loopback_ipv4_pool: 10.0.0.0/24                # Loopback0: 10.0.0.[NodeID]/32
    structured_config:
      vlan_internal_order: null
      router_bgp: "{{ csc_backbone_rr_bgp.router_bgp }}"
  nodes:
    - name: BB1
      id: 1                                        # → Loopback0 = 10.0.0.1/32
      mgmt_ip: 172.100.100.101/22
      structured_config:
        router_bfd: null   # guide BB has no bfd tuning block
        mac_address_table: null
        router_bgp:
          router_id: 1.1.0.1
          address_family_ipv4:
            networks:
              - prefix: 10.0.0.1/32
    - name: BB2
      id: 2                                        # → Loopback0 = 10.0.0.2/32
      mgmt_ip: 172.100.100.102/22
      structured_config:
        router_bfd: null   # guide BB has no bfd tuning block
        mac_address_table: null
        router_bgp:
          router_id: 1.1.0.2
          address_family_ipv4:
            networks:
              - prefix: 10.0.0.2/32

##########################################################
# DCI Connectivity — BB1/BB2 to Domain A + Domain B Gateway pairs
#
# Duplicates the l3_edge.p2p_links from DOMAIN_A_FABRIC.yml and
# DOMAIN_B_FABRIC.yml so the BB1/BB2 side of each link renders.
# AVD's l3_edge is per-fabric — links defined in a domain fabric
# don't cross the fabric boundary into BACKBONE.
##########################################################

l3_edge:
  p2p_links:
    # BB1↔A-LEAF7 (BB1 Et1 ↔ A-LEAF7 Et7)
    - nodes: [A-LEAF7, BB1]
      interfaces: [Ethernet7, Ethernet1]
      subnet: 172.16.1.0/31
      ip:
        - 172.16.1.1/31
        - 172.16.1.0/31
      include_in_underlay_protocol: false

    # BB2↔A-LEAF7 (BB2 Et1 ↔ A-LEAF7 Et8)
    - nodes: [A-LEAF7, BB2]
      interfaces: [Ethernet8, Ethernet1]
      subnet: 172.16.1.4/31
      ip:
        - 172.16.1.5/31
        - 172.16.1.4/31
      include_in_underlay_protocol: false

    # BB1↔A-LEAF8 (BB1 Et2 ↔ A-LEAF8 Et7)
    - nodes: [A-LEAF8, BB1]
      interfaces: [Ethernet7, Ethernet2]
      subnet: 172.16.1.2/31
      ip:
        - 172.16.1.3/31
        - 172.16.1.2/31
      include_in_underlay_protocol: false

    # BB2↔A-LEAF8 (BB2 Et2 ↔ A-LEAF8 Et8)
    - nodes: [A-LEAF8, BB2]
      interfaces: [Ethernet8, Ethernet2]
      subnet: 172.16.1.6/31
      ip:
        - 172.16.1.7/31
        - 172.16.1.6/31
      include_in_underlay_protocol: false

    # BB1↔B-LEAF7 (BB1 Et3 ↔ B-LEAF7 Et7)
    - nodes: [B-LEAF7, BB1]
      interfaces: [Ethernet7, Ethernet3]
      subnet: 172.16.2.0/31
      ip:
        - 172.16.2.1/31
        - 172.16.2.0/31
      include_in_underlay_protocol: false

    # BB2↔B-LEAF7 (BB2 Et3 ↔ B-LEAF7 Et8)
    - nodes: [B-LEAF7, BB2]
      interfaces: [Ethernet8, Ethernet3]
      subnet: 172.16.2.4/31
      ip:
        - 172.16.2.5/31
        - 172.16.2.4/31
      include_in_underlay_protocol: false

    # BB1↔B-LEAF8 (BB1 Et4 ↔ B-LEAF8 Et7)
    - nodes: [B-LEAF8, BB1]
      interfaces: [Ethernet7, Ethernet4]
      subnet: 172.16.2.2/31
      ip:
        - 172.16.2.3/31
        - 172.16.2.2/31
      include_in_underlay_protocol: false

    # BB2↔B-LEAF8 (BB2 Et4 ↔ B-LEAF8 Et8)
    - nodes: [B-LEAF8, BB2]
      interfaces: [Ethernet8, Ethernet4]
      subnet: 172.16.2.6/31
      ip:
        - 172.16.2.7/31
        - 172.16.2.6/31
      include_in_underlay_protocol: false

    # BB1↔BB2 direct link (BB1 Et5 ↔ BB2 Et5)
    - nodes: [BB1, BB2]
      interfaces: [Ethernet5, Ethernet5]
      subnet: 172.16.255.0/31
      ip:
        - 172.16.255.0/31
        - 172.16.255.1/31
      include_in_underlay_protocol: false
