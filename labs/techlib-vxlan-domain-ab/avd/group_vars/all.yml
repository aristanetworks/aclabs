---

# AAA settings — matches tech-library (nopassword for lab reproducibility)
aaa_settings:
  authentication:
    policies:
      local:
        allow_nopassword: true
  authorization:
    exec:
      default: local
  local_users:
    - name: admin
      privilege: 15
      role: network-admin
      no_password: true

# Global ARP Timer
custom_structured_configuration_arp:
  aging:
    timeout_default: 1500

# DNS Settings
dns_settings:
  domain: aclabs.lab
  servers:
    - vrf: use_mgmt_interface_vrf
      ip_address: 8.8.8.8

# Enable eAPI — MGMT vrf only, no protocol overrides (matches tech-library)
management_eapi:
  enabled: true
  vrfs:
    - enabled: true
      name: use_mgmt_interface_vrf

# Event Monitor in EOS
event_monitor:
  enabled: true

# Global MAC Aging Timer
mac_address_table:
  aging_time: 1800

# Out of Band Management
mgmt_gateway: 172.100.100.1
mgmt_interface_settings:
  interface: Management0
  vrf: MGMT
default_mgmt_method: oob

# Set source interfaces (SSH server is enabled by default in EOS; no explicit
# `management ssh` block needed. Tech-library omits the block entirely.)
source_interfaces:
  http_client:
    mgmt_interface: true
  ssh_client:
    mgmt_interface: true

# NTP Servers
ntp_settings:
  server_vrf: use_mgmt_interface_vrf
  servers:
    - name: time.google.com
      iburst: true
    - name: time.windows.com
      iburst: true
    - name: time.apple.com
      iburst: true

timezone: America/Detroit

# ── Phase-2 rebuild foundation (PARITY-LEDGER classes 10/12/14/18) ──────────

# Class 12: the guide writes `spanning-tree portfast edge` (modern syntax).
# eos_config_future is an eos_cli_config_gen INPUT — it must travel inside
# the structured config (the renderer only sees that document), hence CSC.
custom_structured_configuration_eos_config_future:
  render_spanning_tree_portfast_edge: true

# Class 14: the guide's multihop BFD timers are 1000/1000/3 (AVD default 300).
bfd_multihop:
  interval: 1000
  min_rx: 1000
  multiplier: 3

# Class 10: a switch never saves the default-config block. The two lines the
# guide DOES keep from it are re-added explicitly:
#   - `no aaa root`      -> aaa_root.disabled (27/27 nodes in the guide)
#   - `service routing protocols model multi-agent` -> set natively by
#     eos_designs for EVPN fabrics (verified to survive this kill)
# `transceiver qsfp default-mode 4x10G` exists on only 2/27 guide nodes and
# is re-added there (BACKBONE vars), not globally.
# (Empirical: the default-config block's only live leak here is
# `no enable password`, which actually renders from enable_password.disabled
# set by eos_designs — nulled below. aaa_root stays explicit for `no aaa
# root`, 27/27 in the guide.)
custom_structured_configuration_aaa_root:
  disabled: true
custom_structured_configuration_enable_password:
  disabled: null

# Class 18 (partial), empirical CSC-null probe: eos_designs unconditionally
# sets router_multicast.ipv4.software_forwarding=sfe on evpn_multicast nodes
# (base/__init__.py:142, no knob) — the guide has the line on 0/27 nodes.
# Null-merge clears the key if the merge+template honor it (this build is
# the experiment; fallback documented in the ledger).
custom_structured_configuration_router_multicast:
  ipv4:
    software_forwarding: null

# Same probe for `protocol https` (27x extra): explicit line vs EOS default.
custom_structured_configuration_management_api_http:
  enable_https: null

# Global IP MTU for Point-to-Point links (matches tech-library fabric interfaces)
p2p_uplinks_mtu: 9114

# NOTE: overriding the default interface descriptions from
# "P2P_<peer>_<peer_int>" to just "<peer>" requires either a custom
# Jinja template file or a custom Python interface_descriptions module.
# Deferred as a follow-up cosmetic parity item — functionally the AVD
# default descriptions work fine.

# Default mode of "routed" interfaces
custom_structured_configuration_switchport_default:
  mode: routed

# cEOSLab-specific settings that tech-library renders on every node.
custom_structured_configuration_system:
  l1:
    unsupported_speed_action: error
    unsupported_error_correction_action: error

custom_structured_configuration_load_interval:
  default: 1

# `no service interface inactive port-id allocation disabled` — no native
# AVD 6.3 schema key. Applied via top-level eos_cli (renders at end of config).
custom_structured_configuration_eos_cli: |
  no service interface inactive port-id allocation disabled

ansible_user: admin
ansible_password: admin
ansible_network_os: arista.eos.eos
# Configure privilege escalation
ansible_become: true
ansible_become_method: enable
# HTTPAPI configuration
ansible_connection: ansible.netcommon.httpapi
ansible_httpapi_port: 443
ansible_httpapi_use_ssl: true
ansible_httpapi_validate_certs: false
ansible_python_interpreter: $(which python3)
