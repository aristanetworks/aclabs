---
###################################################
# Domain B — Tenants, VRFs, SVIs, OISM
###################################################

tenants:
  - name: DOMAIN_B_FABRIC
    mac_vrf_vni_base: 10000
    evpn_l2_multi_domain: false

    vrfs:
      - name: PROD
        vrf_vni: 50001
        # PARITY-LEDGER class 8/20 — the guide carries `update wait-install`
        # inside every VRF BGP context on Domain B leafs. Domain A gets these
        # free from its MLAG iBGP VRF peerings; B VRFs have no VRF peers, so
        # eos_designs never emits it. vrfs[].bgp.structured_config scopes the
        # line to exactly the nodes that carry the VRF.
        bgp:
          structured_config:
            updates:
              wait_install: true
        evpn_l3_multicast:
          enabled: true
          evpn_underlay_l3_multicast_group: 232.1.1.1
        vtep_diagnostic:
          loopback: 101
          loopback_ip_range: 10.101.101.0/24
        svis:
          - id: 10
            name: Blue
            tags: ['PROD', 'BLUE']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.10.10.1/24
            ipv6_address_virtuals: [2001:db8:10:10::1/64]
            evpn_l2_multi_domain: false   # Multi-domain handled via CSC on Gateway host_vars
          - id: 20
            name: Green
            tags: ['PROD', 'GREEN']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.20.20.1/24
            ipv6_address_virtuals: [2001:db8:20:20::1/64]
            evpn_l2_multi_domain: false
          - id: 40
            name: Purple
            tags: ['PROD', 'PURPLE']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.40.40.1/24
            ipv6_address_virtuals: [2001:db8:40:40::1/64]
            evpn_l2_multi_domain: false

      - name: DEV
        vrf_vni: 50002
        # PARITY-LEDGER class 8/20 — the guide carries `update wait-install`
        # inside every VRF BGP context on Domain B leafs. Domain A gets these
        # free from its MLAG iBGP VRF peerings; B VRFs have no VRF peers, so
        # eos_designs never emits it. vrfs[].bgp.structured_config scopes the
        # line to exactly the nodes that carry the VRF.
        bgp:
          structured_config:
            updates:
              wait_install: true
        evpn_l3_multicast:
          enabled: true
          evpn_underlay_l3_multicast_group: 232.1.1.2
        vtep_diagnostic:
          loopback: 102
          loopback_ip_range: 10.102.102.0/24
        svis:
          - id: 60
            name: Red
            tags: ['DEV', 'RED']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.60.60.1/24
            ipv6_address_virtuals: [2001:db8:60:60::1/64]
            evpn_l2_multi_domain: false
          - id: 70
            name: Brown
            tags: ['DEV', 'BROWN']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.70.70.1/24
            ipv6_address_virtuals: [2001:db8:70:70::1/64]
            evpn_l2_multi_domain: false   # Multi-domain handled via CSC on Gateway host_vars
          - id: 80
            name: Black
            tags: ['DEV', 'BLACK']
            enabled: true
            mtu: 9014
            ip_address_virtual: 10.80.80.1/24
            ipv6_address_virtuals: [2001:db8:80:80::1/64]
            evpn_l2_multi_domain: false
