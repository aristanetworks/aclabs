---
###################################################
# B-LEAF7 — EVPN Gateway (All-Active), Domain B
###################################################

evpn_multicast: false
underlay_multicast_pim_sm: false

b_leaf7_gateway_csc:
  router_bgp:
    neighbors:
      - ip_address: 172.16.2.0
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.2.4
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4
    peer_groups:
      - name: LOCAL-EVPN-PEERS
        session_tracker: TRACK-LOCAL-EVPN-PEERS
    # NOTE: `route type ethernet-segment route-target auto` and
    # `domain identifier 65207:65207 attach` will be added via raw_eos_cli
    # in a follow-up commit (no native AVD 6.3 schema for these two lines).
    session_trackers:
      - name: TRACK-LOCAL-EVPN-PEERS
        recovery_delay: 10
    # Multi-domain MAC-VRFs on VLANs 10 and 70 (shared with Domain A).
    vlans:
      - id: 10
        rd_evpn_domain:
          domain: all
          rd: '10.0.2.7:10010'
        route_targets:
          import_export_evpn_domains:
            - domain: all
              route_target: '10010:10010'
      - id: 70
        rd_evpn_domain:
          domain: all
          rd: '10.0.2.7:10070'
        route_targets:
          import_export_evpn_domains:
            - domain: all
              route_target: '10070:10070'
    vrfs:
      - name: PROD
        rd_evpn_domain:
          domain: all
          rd: '10.0.2.7:50001'
        route_targets:
          import_evpn_domains:
            - domain: all
              route_target: '50001:50001'
          export_evpn_domains:
            - domain: all
              route_target: '50001:50001'
      - name: DEV
        rd_evpn_domain:
          domain: all
          rd: '10.0.2.7:50002'
        route_targets:
          import_evpn_domains:
            - domain: all
              route_target: '50002:50002'
          export_evpn_domains:
            - domain: all
              route_target: '50002:50002'

b_leaf7_hostb8_csc:
  port_channel_interfaces:
    - name: Port-Channel9
      bgp:
        session_tracker: TRACK-LOCAL-EVPN-PEERS

custom_structured_configuration_router_bgp: "{{ b_leaf7_gateway_csc.router_bgp }}"
custom_structured_configuration_port_channel_interfaces: "{{ b_leaf7_hostb8_csc.port_channel_interfaces }}"
