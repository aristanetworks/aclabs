---
###################################################
# A-LEAF7 — EVPN Gateway (All-Active), Domain A
#
# Fabric-level defaults + POD4 evpn_gateway config in
# group_vars/DOMAIN_A_FABRIC.yml handle the bulk of the Gateway shape.
# This host_vars file layers on the A-LEAF7-specific overrides.
###################################################

# OISM is not enabled on the Gateway pair (Multi-Domain VXLAN-MPLS EVPN
# doesn't yet support OISM across the domain boundary; HostA8 is unicast-only).
evpn_multicast: false
underlay_multicast_pim_sm: false

###################################################
# Custom Structured Config — Gateway-side
#
# CSC: three things AVD's evpn_gateway doesn't natively express:
#   1. The `domain identifier <own-ASN>:<own-ASN> attach` D-PATH tag,
#      applied to Type-2 and Type-5 routes locally originated for
#      HostA8. On A-LEAF7 this is `65107:65107 attach`.
#   2. The BGP Session Tracker (`TRACK-EVPN-PEERS`) that binds HostA8's
#      port-channel to the state of the local-domain EVPN peerings.
#   3. `route type ethernet-segment route-target auto` under
#      address-family evpn — auto-derive the ES-Import route-target.
###################################################

a_leaf7_gateway_csc:
  router_bgp:
    # PARITY-LEDGER class 8 — LANDMINE: this host_vars file defines
    # custom_structured_configuration_router_bgp, which SHADOWS the
    # group-level variable of the same name (Ansible host>group
    # precedence — the group var is replaced wholesale, never merged).
    # Any fabric-wide router_bgp dialect knob must therefore be
    # repeated inside this anchor.
    neighbor_default:
      send_community: all
    # Class 8 (A gateway): un-set the explicit ipv4-AF deactivate —
    # implicit via `no bgp default ipv4-unicast`, same as the fabric.
    address_family_ipv4:
      peer_groups:
        - name: LOCAL-EVPN-PEERS
          activate: null
    neighbors:
      - ip_address: 172.16.1.0
        peer_group: REMOTE-IPV4-PEERS
        description: BB1.IPV4
      - ip_address: 172.16.1.4
        peer_group: REMOTE-IPV4-PEERS
        description: BB2.IPV4
    peer_groups:
      - name: LOCAL-EVPN-PEERS
        session_tracker: TRACK-EVPN-PEERS
    # Two lines AVD 6.3's schema doesn't natively express — injected via
    # router_bgp.eos_cli multi-line string. Renders inside `router bgp
    # <ASN>` at end. Ordering doesn't matter for these two lines.
    eos_cli: |
      !
      address-family evpn
         route type ethernet-segment route-target auto
         domain identifier 65107:65107 attach
         !
         evpn ethernet-segment domain all
            designated-forwarder election algorithm preference 2000
    session_trackers:
      - name: TRACK-EVPN-PEERS
        recovery_delay: 10
    # Class 3: the IP-VRF `rd evpn domain all` + RT overrides died with
    # the native swap — evpn_gateway.evpn_l3.mode: rd-rt-rewrite covers
    # L3 (render-gated identical to the guide). The MAC-VRF (VLAN 10/70)
    # domain-all overrides below MUST stay: the mode is L3-only; AVD has
    # no native L2 domain-all rewrite in 6.3.
    vlans:
      - id: 10
        rd_evpn_domain:
          domain: all
          rd: '10.0.1.7:10010'
        route_targets:
          import_export_evpn_domains:
            - domain: all
              route_target: '10010:10010'
      - id: 70
        rd_evpn_domain:
          domain: all
          rd: '10.0.1.7:10070'
        route_targets:
          import_export_evpn_domains:
            - domain: all
              route_target: '10070:10070'
# CSC: HostA8 port-channel needs a `bgp session tracker TRACK-EVPN-PEERS`
# statement. AVD's connected_endpoints doesn't currently expose this;
# apply via port_channel_interfaces override.
a_leaf7_hosta8_csc:
  port_channel_interfaces:
    - name: Port-Channel9
      bgp:
        session_tracker: TRACK-EVPN-PEERS

custom_structured_configuration_router_bgp: "{{ a_leaf7_gateway_csc.router_bgp }}"
custom_structured_configuration_port_channel_interfaces: "{{ a_leaf7_hosta8_csc.port_channel_interfaces }}"

# Shadow the fleet CSC router-multicast (host>group precedence replaces
# wholesale) — this node's block rides the eos_cli verbatim / guide has none.
custom_structured_configuration_router_multicast: {}
