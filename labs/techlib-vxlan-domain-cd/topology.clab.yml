    ###############################################################
    ###############################################################
    ###############################################################
    ###############################################################
    #                     DOMAIN "C"                              #
    ###############################################################
    ###############################################################
    ###############################################################
    ###############################################################
    ###############################################################


    #########################
    # Domain C SPINE        #
    #########################

    C-SPINE1:
      kind: arista_ceos
      mgmt-ipv4: 172.100.101.101
      binds:
        - sn/__clabNodeName__.txt:/mnt/flash/ceos-config:ro
      startup-config: startup-configs/__clabLabName__/__clabNodeName__/startup-config

    C-SPINE2:
      kind: arista_ceos
      mgmt-ipv4: 172.100.101.102
