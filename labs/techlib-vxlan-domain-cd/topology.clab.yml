---
# --------------------------------------------------------------
# Arista EVPN Deployment Guide Topology - Domains C and D
# --------------------------------------------------------------

name: arista-evpn-dg-domain-cd

prefix: ""

mgmt:
  network: mgmt
  ipv4-subnet: 172.100.100.0/22

topology:

  kinds:
    arista_ceos:
      enforce-startup-config: true
      image: arista/ceos:latest
      env:
        CLAB_MGMT_VRF: MGMT
        INTFTYPE: et
    linux:
      image: ghcr.io/aristanetworks/aclabs/host-ubuntu:rev1.7

  nodes:

