!
no enable password
no aaa root
!
username admin privilege 15 role network-admin nopassword
!
aaa authentication policy local allow-nopassword-remote-login
username arista privilege 15 role network-admin secret sha512 $6$Ap6u4I1WR/jMoNKe$LPLoHgIXFg5kiGPDWGF0w5lVVuOZZ4T15cIBbNxE2ykqh98uVvsi9jPdybkbTXBTZFzi3haaPJVaGVwnpuck40
!
switchport default mode routed
!
vlan internal order ascending range 1006 1199
!
event-monitor
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname B-LEAF1
ip domain lookup vrf MGMT source-interface Management0
ip name-server vrf MGMT 8.8.8.8
dns domain aclabs.lab
!
spanning-tree mode mstp
no spanning-tree vlan-id 4094
spanning-tree mst 0 priority 16384
!
clock timezone America/Detroit
!
vlan 10
   name TEN
!
vlan 20
   name TWENTY
!
vlan 40
   name Forty
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance MGMT
!
management api http-commands
   protocol https
   protocol http
   no shutdown
   !
   vrf MGMT
      no shutdown
!
aaa authorization exec default local
!
interface Port-Channel1
   description L2_B-SPINES_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20,40
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel7
   description SERVER_HostB1
   no shutdown
   switchport access vlan 10
   switchport mode access
   switchport
   mlag 7
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Port-Channel8
   description SERVER_HostB2
   no shutdown
   switchport access vlan 40
   switchport mode access
   switchport
   mlag 8
   spanning-tree portfast
   spanning-tree bpduguard enable
!
interface Port-Channel1000
   description MLAG_B-LEAF2_Port-Channel1000
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_B-SPINE1_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_B-SPINE2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet5
   description MLAG_B-LEAF2_Ethernet5
   no shutdown
   channel-group 1000 mode active
!
interface Ethernet6
   description MLAG_B-LEAF2_Ethernet6
   no shutdown
   channel-group 1000 mode active
!
interface Ethernet7
   description SERVER_HostB1_eth1
   no shutdown
   channel-group 7 mode active
!
interface Ethernet8
   description SERVER_HostB2_eth1
   no shutdown
   channel-group 8 mode active
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 172.100.100.23/24
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 9214
   no autostate
   ip address 169.254.0.0/31
!
mac address-table aging-time 1800
no ip routing vrf MGMT
!
mlag configuration
   domain-id 1000
   local-interface Vlan4094
   peer-address 169.254.0.1
   peer-link Port-Channel1000
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ip route vrf MGMT 0.0.0.0/0 172.100.100.1
!
arp aging timeout default 1500
!
ip http client local-interface Management0 vrf MGMT
ip ssh client source-interface Management0 vrf MGMT
!
ntp local-interface vrf MGMT Management0
ntp server vrf MGMT time.apple.com iburst
ntp server vrf MGMT time.google.com prefer iburst
ntp server vrf MGMT time.windows.com iburst
!
management ssh
   !
   vrf MGMT
      no shutdown
!
end
