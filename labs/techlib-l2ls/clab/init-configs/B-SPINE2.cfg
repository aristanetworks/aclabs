!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$eucN5ngreuExDgwS$xnD7T8jO..GBDX0DUlp.hn.W7yW94xTjSanqgaQGBzPIhDAsyAl9N4oScHvOMvf07uVBFI4mKMxwdVEUVKgY/.
username arista privilege 15 role network-admin secret sha512 $6$Ap6u4I1WR/jMoNKe$LPLoHgIXFg5kiGPDWGF0w5lVVuOZZ4T15cIBbNxE2ykqh98uVvsi9jPdybkbTXBTZFzi3haaPJVaGVwnpuck40
!
switchport default mode routed
!
vlan internal order ascending range 1006 1199
!
event-monitor
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname B-SPINE2
ip domain lookup vrf MGMT source-interface Management0
ip name-server vrf MGMT 8.8.8.8
dns domain aclabs.lab
!
spanning-tree mode mstp
no spanning-tree vlan-id 4093-4094
spanning-tree mst 0 priority 0
!
clock timezone America/Detroit
!
vlan 10
   name TEN
!
vlan 20
   name TWENTY
!
vlan 30
   name THIRTY
!
vlan 4093
   name MLAG_L3
   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance MGMT
!
management api http-commands
   protocol https
   protocol http
   no shutdown
   !
   vrf MGMT
      no shutdown
!
aaa authorization exec default local
!
interface Port-Channel1
   description L2_B-POD1_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20,30
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel3
   description L2_B-POD2_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20,30
   switchport mode trunk
   switchport
   mlag 3
!
interface Port-Channel1000
   description MLAG_B-SPINE1_Port-Channel1000
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_B-LEAF1_Ethernet2
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_B-LEAF2_Ethernet2
   no shutdown
   channel-group 1 mode active
!
interface Ethernet3
   description L2_B-LEAF3_Ethernet2
   no shutdown
   channel-group 3 mode active
!
interface Ethernet4
   description L2_B-LEAF4_Ethernet2
   no shutdown
   channel-group 3 mode active
!
interface Ethernet5
   description P2P_A-SPINE1_Ethernet6
   no shutdown
   mtu 9214
   no switchport
   ip address 172.16.255.3/31
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet6
   description P2P_A-SPINE2_Ethernet6
   no shutdown
   mtu 9214
   no switchport
   ip address 172.16.255.7/31
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Ethernet7
   description MLAG_B-SPINE1_Ethernet7
   no shutdown
   channel-group 1000 mode active
!
interface Ethernet8
   description MLAG_B-SPINE1_Ethernet8
   no shutdown
   channel-group 1000 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.254.2.2/32
   ip ospf area 0.0.0.0
!
interface Loopback1
   description Shared VTEP IP
   no shutdown
   ip address 10.255.2.1/32
   ip ospf area 0.0.0.0
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 172.100.100.21/24
!
interface Vlan10
   description TEN
   no shutdown
   ip address 10.10.10.5/24
   ip virtual-router address 10.10.10.1
!
interface Vlan20
   description TWENTY
   no shutdown
   ip address 10.20.20.5/24
   ip virtual-router address 10.20.20.1
!
interface Vlan30
   description THIRTY
   no shutdown
   ip address 10.30.30.5/24
   ip virtual-router address 10.30.30.1
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 9214
   ip address 192.0.0.1/31
   ip ospf network point-to-point
   ip ospf area 0.0.0.0
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 9214
   no autostate
   ip address 169.254.0.1/31
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vlan 30 vni 10030
   vxlan vlan 40 vni 10040
   vxlan flood vtep 10.255.1.1
!
mac address-table aging-time 1800
!
ip virtual-router mac-address 00:1c:73:00:dc:01
!
ip routing
no ip routing vrf MGMT
!
mlag configuration
   domain-id 1000
   local-interface Vlan4094
   peer-address 169.254.0.0
   peer-link Port-Channel1000
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ip route vrf MGMT 0.0.0.0/0 172.100.100.1
!
arp aging timeout default 1500
!
ip http client local-interface Management0 vrf MGMT
ip ssh client source-interface Management0 vrf MGMT
!
ntp local-interface vrf MGMT Management0
ntp server vrf MGMT time.apple.com iburst
ntp server vrf MGMT time.google.com prefer iburst
ntp server vrf MGMT time.windows.com iburst
!
router ospf 100
   router-id 10.254.2.2
   passive-interface default
   no passive-interface Ethernet5
   no passive-interface Ethernet6
   no passive-interface Vlan4093
   redistribute connected
   max-lsa 12000
!
management ssh
   !
   vrf MGMT
      no shutdown
!
end
