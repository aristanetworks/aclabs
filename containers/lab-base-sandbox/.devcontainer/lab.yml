# Sandbox lab metadata for sandbox-dashboard v0.10.0+.
#
# Baked into the lab-base-sandbox container image and read by
# sandbox-dashboard at extension activation. Rendered as the
# Lab Overview card at the top of the dashboard.
#
# This file is NOT user-editable — it ships with the container
# image. To change it, edit this file and bump the container
# revision (see Pattern 23 in docs/retrospective.md in the
# sandbox-dashboard repo).
#
# Schema reference: src/lab-metadata.ts in PacketAnglers/sandbox-dashboard
#
# RENDERING NOTE: the description field is rendered as PLAIN TEXT
# in the dashboard (textContent, not innerHTML). Line breaks and
# emoji work; inline markdown (**bold**, _italic_, [links](url),
# `code`) does NOT render as formatting and will appear as literal
# characters. See the JSDoc note on the description field in
# src/lab-metadata.ts in PacketAnglers/sandbox-dashboard for the
# full contract.

name: Welcome to the Sandbox!

description: |
  This sandbox environment is available to all Arista employees and ships with
  ContainerLab, cEOS-lab, AVD, ardl (Arista's downloader), gnmic, and more!

  Whether it's designing, testing, demoing, or just tinkering, this Sandbox is here
  to help make labbing up solutions as seamless as possible.

  Use the dashboard buttons below to build a topology, deploy it, save configs,
  push your work to GitHub, onboard your lab to CVaaS, and more. All without
  leaving the IDE.

  Happy labbing! 🧪

resources:
  cpu: 16
  memory: 64G
  storage: 128G

links:
  - label: Getting Started
    url: workspace://README.md
    icon: 📖
  - label: Report an Issue
    url: https://github.com/PacketAnglers/sandbox-dashboard/issues
    icon: 🐛
